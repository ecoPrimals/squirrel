name: Squirrel Plugins Fuzzing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Schedule a weekly run to perform longer fuzzing sessions
  schedule:
    - cron: '0 0 * * 0'  # Run at midnight on Sundays

jobs:
  # Quick fuzzing run for PRs and regular commits
  quick-fuzz:
    name: Quick Fuzzing
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        target: [dynamic_library, plugin_command]
      fail-fast: false  # Don't fail fast to get results from all targets
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
        
      - name: Run fuzzer (2 minute timeout)
        working-directory: ./fuzz
        run: |
          timeout 2m cargo fuzz run ${{ matrix.target }} || code=$?; if [[ $code -eq 124 ]]; then exit 0; else exit $code; fi
        shell: bash
      
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.os }}-${{ matrix.target }}-crashes
          path: ./fuzz/artifacts/${{ matrix.target }}/crashes
  
  # Extended fuzzing run for scheduled jobs
  extended-fuzz:
    name: Extended Fuzzing
    if: github.event_name == 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        target: [dynamic_library, plugin_command]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
        
      - name: Run fuzzer (1 hour timeout)
        working-directory: ./fuzz
        run: |
          timeout 60m cargo fuzz run ${{ matrix.target }} || code=$?; if [[ $code -eq 124 ]]; then exit 0; else exit $code; fi
        shell: bash
      
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.os }}-${{ matrix.target }}-crashes-extended
          path: ./fuzz/artifacts/${{ matrix.target }}/crashes
      
      - name: Upload corpus
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.os }}-${{ matrix.target }}-corpus
          path: ./fuzz/artifacts/${{ matrix.target }}/corpus
  
  # Generate coverage report from fuzzing
  coverage:
    name: Fuzzing Coverage Report
    needs: [quick-fuzz]
    runs-on: ubuntu-latest
    if: success() || failure()  # Run even if fuzzing fails
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: llvm-tools-preview
          override: true
      
      - name: Install grcov
        run: cargo install grcov
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./artifacts
      
      - name: Generate coverage report
        env:
          RUSTFLAGS: "-Zinstrument-coverage"
          LLVM_PROFILE_FILE: "fuzz-%p-%m.profraw"
        run: |
          # Run each fuzzer with the corpus
          for target in dynamic_library plugin_command; do
            cargo run --bin fuzz_$target -- ./artifacts/*-$target-corpus/*
          done
          
          # Generate coverage report
          grcov . --binary-path ./target/debug/ -s . -t html --branch --ignore-not-existing -o ./coverage/
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: ./coverage 
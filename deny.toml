# SPDX-License-Identifier: AGPL-3.0-only
# cargo-deny configuration for ecoPrimals supply chain auditing

[advisories]
version = 2
# cargo-deny 0.19: vulnerability/notice always deny; unmaintained uses scope
unmaintained = "workspace"
yanked = "deny"

[licenses]
version = 2
allow = [
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# ecoBin: Pure Rust required. ring/openssl contain C/ASM; use RustCrypto/rustls alternatives.
# Default build (no HTTP features) has zero ring. HTTP features (reqwest) pull ring via rustls;
# migration path: rustls-tls-manual-roots-no-provider + aws-lc-rs or rustls-rustcrypto. See docs/CRYPTO_MIGRATION.md.
deny = [
    { name = "ring", reason = "ecoBin: C/ASM crypto. Use rustls-tls-manual-roots-no-provider + aws-lc-rs, or RustCrypto for hashing. See docs/CRYPTO_MIGRATION.md.", use-instead = "rustls (aws-lc-rs/rustls-rustcrypto), sha2, blake3" },
    { name = "openssl", reason = "ecoBin: C crypto. Use rustls or RustCrypto suite.", use-instead = "rustls, sha2, aes-gcm, ed25519-dalek" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

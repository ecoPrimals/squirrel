# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration for ecoPrimals supply chain auditing

[advisories]
version = 2
# cargo-deny 0.19: vulnerability/notice always deny; unmaintained uses scope
unmaintained = "workspace"
yanked = "deny"
# known transitive advisories from deps we cannot yet replace
ignore = [
    # bincode: unmaintained — transitive via tarpc (our IPC layer); tarpc requires it
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
allow = [
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# ecoBin v3: Pure Rust required. C-dependency ban list per groundSpring V115 / wateringHole standard.
# Exceptions: feature-gated build-time deps (wasmtime, sqlx-sqlite) are tolerated
# behind optional features with documented migration paths.
# pprof removed — migrate to samply for profiling.
deny = [
    { name = "openssl-sys", reason = "ecoBin: C crypto FFI. Use rustls + RustCrypto.", use-instead = "rustls" },
    { name = "openssl", reason = "ecoBin: C crypto. Use rustls or RustCrypto suite.", use-instead = "rustls, sha2, aes-gcm, ed25519-dalek" },
    { name = "native-tls", reason = "ecoBin: platform C TLS. Use rustls.", use-instead = "rustls" },
    { name = "aws-lc-sys", reason = "ecoBin: C crypto FFI. Use RustCrypto.", use-instead = "sha2, aes-gcm" },
    { name = "aws-lc-rs", reason = "ecoBin: C/ASM crypto. Use RustCrypto.", use-instead = "sha2, aes-gcm, ed25519-dalek" },
    { name = "ring", reason = "ecoBin: C/ASM crypto. See docs/CRYPTO_MIGRATION.md.", use-instead = "rustls (rustls-rustcrypto), sha2, blake3" },
    { name = "libz-sys", reason = "ecoBin: C compression FFI. Use flate2 (rust backend) or miniz_oxide.", use-instead = "flate2 (default-features = false, features = [\"rust_backend\"])" },
    { name = "bzip2-sys", reason = "ecoBin: C compression FFI.", use-instead = "bzip2-rs" },
    { name = "curl-sys", reason = "ecoBin: C HTTP FFI. Use reqwest (rustls).", use-instead = "reqwest" },
    { name = "cmake", reason = "ecoBin: C build system. Pure Rust only.", use-instead = "cc-free alternatives" },
    { name = "pkg-config", reason = "ecoBin: C pkg-config FFI discovery.", use-instead = "Pure Rust crates" },
    { name = "vcpkg", reason = "ecoBin: C/C++ package manager integration.", use-instead = "Pure Rust crates" },
    { name = "reqwest", reason = "Tower Atomic: HTTP must route through Songbird service mesh via IPC, not direct from primals.", use-instead = "capability.call via Unix socket (Tower Atomic pattern)" },
]
# cc (build-time only) enters via wasmtime → ittapi-sys.
# Behind optional features; default build is pure Rust.
# pprof removed (ecoBin v3 migration complete); wasmtime → cc-free backend pending.
# ring enters transitively via sqlx → rustls 0.23 (default crypto provider).
# ecoBin v3 migration: sqlx + rustls-rustcrypto (pure Rust crypto provider).
# reqwest is optional in 10+ crates behind feature gates (direct-http, http-auth, etc.).
# Default build is reqwest-free. Tower Atomic: all HTTP routes through Songbird via IPC.
# Migration: remove optional reqwest deps as crates evolve to capability.call pattern.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

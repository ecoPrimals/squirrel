# SPDX-License-Identifier: AGPL-3.0-only
# cargo-deny configuration for ecoPrimals supply chain auditing

[advisories]
version = 2
# cargo-deny 0.19: vulnerability/notice always deny; unmaintained uses scope
unmaintained = "workspace"
yanked = "deny"

[licenses]
version = 2
allow = [
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# ecoBin v3: Pure Rust required. 14-crate C-dependency ban list per groundSpring V115 / wateringHole standard.
# ring allowed only as transitive dep of rustls (feature-gated); migration: rustls-rustcrypto.
deny = [
    { name = "openssl-sys", reason = "ecoBin: C crypto FFI. Use rustls + RustCrypto.", use-instead = "rustls" },
    { name = "openssl", reason = "ecoBin: C crypto. Use rustls or RustCrypto suite.", use-instead = "rustls, sha2, aes-gcm, ed25519-dalek" },
    { name = "native-tls", reason = "ecoBin: platform C TLS. Use rustls.", use-instead = "rustls" },
    { name = "aws-lc-sys", reason = "ecoBin: C crypto FFI. Use RustCrypto.", use-instead = "sha2, aes-gcm" },
    { name = "aws-lc-rs", reason = "ecoBin: C/ASM crypto. Use RustCrypto.", use-instead = "sha2, aes-gcm, ed25519-dalek" },
    { name = "ring", reason = "ecoBin: C/ASM crypto. See docs/CRYPTO_MIGRATION.md.", use-instead = "rustls (rustls-rustcrypto), sha2, blake3" },
    { name = "libz-sys", reason = "ecoBin: C compression FFI. Use flate2 (rust backend) or miniz_oxide.", use-instead = "flate2 (default-features = false, features = [\"rust_backend\"])" },
    { name = "bzip2-sys", reason = "ecoBin: C compression FFI.", use-instead = "bzip2-rs" },
    { name = "curl-sys", reason = "ecoBin: C HTTP FFI. Use reqwest (rustls).", use-instead = "reqwest" },
    { name = "libsqlite3-sys", reason = "ecoBin: C database FFI. Use rusqlite bundled or redb.", use-instead = "redb, sled" },
    { name = "cmake", reason = "ecoBin: C build system. Pure Rust only.", use-instead = "cc-free alternatives" },
    { name = "cc", reason = "ecoBin: C compiler invocation. Pure Rust only.", use-instead = "Pure Rust crates" },
    { name = "pkg-config", reason = "ecoBin: C pkg-config FFI discovery.", use-instead = "Pure Rust crates" },
    { name = "vcpkg", reason = "ecoBin: C/C++ package manager integration.", use-instead = "Pure Rust crates" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

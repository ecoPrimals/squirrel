[package]
name = "dynamic-plugin-example"
version = "0.1.0"
edition = "2021"
authors = ["DataScienceBioLab"]
description = "Example of a dynamically loadable plugin for the Squirrel Plugin System"

[lib]
name = "dynamic_plugin_example"
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
squirrel-plugins = { path = "../.." }
tokio = { version = "1.0", features = ["full"] }
tracing = "0.1" 
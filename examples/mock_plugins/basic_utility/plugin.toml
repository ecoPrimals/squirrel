[plugin]
name = "Basic Utility Plugin"
id = "com.datasciencebiolab.basic-utility"
version = "1.0.0"
author = "DataScienceBioLab"
description = "A simple utility plugin for testing the CLI integration"
license = "MIT"
min_app_version = "0.9.0"
repository = "https://github.com/datasciencebiolab/squirrel-plugins"

[capabilities]
# Capability requests with explanations
filesystem_read = "To read configuration files"
filesystem_write = "To save analysis results"
network_outbound = "To check for updates"

[dependencies]
# External dependencies
serde = "1.0"
serde_json = "1.0"
chrono = "0.4"

[resources]
# Resource requirements
memory_mb_min = 64
memory_mb_recommended = 128
disk_mb = 50

[platform]
# Platform compatibility
windows = true
macos = true
linux = true

[commands]
# CLI commands this plugin provides
analyze = "Analyze project structure and provide recommendations"
optimize = "Optimize resource usage based on analysis"
report = "Generate a comprehensive report"

[settings]
# Default settings
report_format = "markdown"
optimization_level = "balanced"
auto_update_check = true 
# biome.yaml - Example biomeOS Ecosystem Manifest
# This file demonstrates all supported configuration options for deploying
# the Squirrel primal ecosystem in a biomeOS environment.

apiVersion: biome/v1
kind: EcosystemManifest
metadata:
  name: squirrel-ecosystem
  namespace: eco-primals
  version: "1.0.0"
  description: "Complete Squirrel primal ecosystem deployment with all primals"
  labels:
    ecosystem: squirrel
    environment: production
    managed-by: biome-os
  annotations:
    biome.io/deployment-strategy: "rolling"
    biome.io/health-check-interval: "30s"
    biome.io/auto-scaling: "enabled"

spec:
  # Ecosystem Configuration
  ecosystem:
    coordination:
      enabled: true
      discovery_timeout: 30s
      health_check_interval: 15s
      max_retry_attempts: 3
      fallback_strategy: "graceful_degradation"
    
    monitoring:
      enabled: true
      metrics_collection: true
      prometheus_export: true
      log_level: "info"
      tracing_enabled: true
    
    security:
      authentication:
        enabled: true
        method: "bearer_token"
        token_rotation_interval: "24h"
      authorization:
        enabled: true
        rbac_policies: "strict"
      encryption:
        enabled: true
        tls_version: "1.3"
        cert_rotation_interval: "30d"

  # Primal Deployments
  primals:
    # Squirrel - Main Coordination Primal
    - name: squirrel
      type: coordination
      version: "1.0.0"
      enabled: true
      replicas: 3
      
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
          storage: "10Gi"
        limits:
          cpu: "2000m"
          memory: "4Gi"
          storage: "50Gi"
      
      networking:
        ports:
          - name: http
            port: 8080
            protocol: TCP
            expose: true
          - name: grpc
            port: 9090
            protocol: TCP
            expose: false
        load_balancing:
          enabled: true
          algorithm: "round_robin"
          health_check_path: "/health"
      
      configuration:
        ecosystem_config:
          songbird_endpoint: "http://songbird:8000"
          registry_sync_interval: "30s"
          service_discovery_timeout: "10s"
        
        shutdown_config:
          graceful_timeout: "30s"
          forceful_timeout: "10s"
          parallel_shutdown: true
          max_concurrent_shutdowns: 10
      
      health_checks:
        liveness_probe:
          path: "/health/live"
          interval: "30s"
          timeout: "5s"
          failure_threshold: 3
        readiness_probe:
          path: "/health/ready"
          interval: "10s"
          timeout: "3s"
          failure_threshold: 2

    # Songbird - Service Discovery and Mesh
    - name: songbird
      type: service_mesh
      version: "1.0.0"
      enabled: true
      replicas: 2
      
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
          storage: "5Gi"
        limits:
          cpu: "1000m"
          memory: "2Gi"
          storage: "20Gi"
      
      networking:
        ports:
          - name: api
            port: 8000
            protocol: TCP
            expose: true
          - name: mesh
            port: 8001
            protocol: TCP
            expose: false
        service_mesh:
          enabled: true
          mTLS: true
          circuit_breaker:
            enabled: true
            failure_threshold: 5
            recovery_timeout: "60s"
      
      configuration:
        service_discovery:
          registry_type: "consul"
          health_check_interval: "15s"
          service_timeout: "30s"
        
        mesh_config:
          encryption: "tls"
          compression: "gzip"
          load_balancing: "least_connections"

    # ToadStool - Compute and AI Processing
    - name: toadstool
      type: compute
      version: "1.0.0"
      enabled: true
      replicas: 2
      
      resources:
        requests:
          cpu: "1000m"
          memory: "2Gi"
          storage: "20Gi"
          gpu: "1"
        limits:
          cpu: "4000m"
          memory: "8Gi"
          storage: "100Gi"
          gpu: "2"
      
      networking:
        ports:
          - name: compute
            port: 8002
            protocol: TCP
            expose: true
          - name: gpu_metrics
            port: 8003
            protocol: TCP
            expose: false
      
      configuration:
        compute_config:
          max_concurrent_jobs: 10
          job_timeout: "300s"
          gpu_allocation: "dynamic"
          model_cache_size: "10Gi"
        
        ai_models:
          - name: "gpt-4"
            provider: "openai"
            max_tokens: 4096
            temperature: 0.7
          - name: "claude-3"
            provider: "anthropic"
            max_tokens: 8192
            temperature: 0.5
      
      scaling:
        auto_scaling:
          enabled: true
          min_replicas: 1
          max_replicas: 5
          target_cpu: 70
          target_memory: 80
          scale_up_cooldown: "300s"
          scale_down_cooldown: "600s"

    # NestGate - Storage and Persistence
    - name: nestgate
      type: storage
      version: "1.0.0"
      enabled: true
      replicas: 3
      
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
          storage: "50Gi"
        limits:
          cpu: "2000m"
          memory: "4Gi"
          storage: "500Gi"
      
      networking:
        ports:
          - name: storage
            port: 8004
            protocol: TCP
            expose: true
          - name: replication
            port: 8005
            protocol: TCP
            expose: false
      
      configuration:
        storage_config:
          backend: "distributed"
          replication_factor: 3
          consistency_level: "quorum"
          compression: "lz4"
          encryption: "aes-256"
        
        backup_config:
          enabled: true
          schedule: "0 2 * * *"  # Daily at 2 AM
          retention: "30d"
          storage_backend: "s3"
          compression: true
      
      persistence:
        enabled: true
        storage_class: "fast-ssd"
        access_mode: "ReadWriteMany"
        size: "100Gi"

    # BearDog - Security and Authentication
    - name: beardog
      type: security
      version: "1.0.0"
      enabled: true
      replicas: 2
      
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
          storage: "5Gi"
        limits:
          cpu: "1000m"
          memory: "2Gi"
          storage: "20Gi"
      
      networking:
        ports:
          - name: auth
            port: 8006
            protocol: TCP
            expose: true
          - name: vault
            port: 8007
            protocol: TCP
            expose: false
      
      configuration:
        auth_config:
          jwt_secret_rotation: "24h"
          session_timeout: "8h"
          mfa_enabled: true
          password_policy: "strong"
        
        security_policies:
          - name: "ecosystem_access"
            effect: "allow"
            principals: ["primal:*"]
            actions: ["read", "write"]
            resources: ["ecosystem:*"]
          - name: "admin_access"
            effect: "allow"
            principals: ["role:admin"]
            actions: ["*"]
            resources: ["*"]

  # Deployment Configuration
  deployment:
    strategy:
      type: "rolling_update"
      max_unavailable: 1
      max_surge: 1
    
    rollback:
      enabled: true
      auto_rollback_on_failure: true
      rollback_timeout: "300s"
    
    scaling:
      horizontal_pod_autoscaler:
        enabled: true
        min_replicas: 1
        max_replicas: 10
        target_cpu_utilization: 70
        target_memory_utilization: 80
    
    resource_quotas:
      cpu: "20"
      memory: "40Gi"
      storage: "1Ti"
      persistent_volumes: 10

  # Monitoring and Observability
  monitoring:
    metrics:
      enabled: true
      collection_interval: "15s"
      retention: "30d"
      exporters:
        - prometheus
        - graphite
    
    logging:
      enabled: true
      level: "info"
      format: "json"
      rotation: "daily"
      retention: "30d"
      aggregation:
        enabled: true
        backend: "elasticsearch"
    
    tracing:
      enabled: true
      sampling_rate: 0.1
      backend: "jaeger"
      retention: "7d"
    
    alerts:
      enabled: true
      notification_channels:
        - type: "slack"
          webhook_url: "https://hooks.slack.com/services/..."
        - type: "email"
          recipients: ["admin@example.com"]
      
      rules:
        - name: "high_cpu_usage"
          condition: "cpu_usage > 80"
          duration: "5m"
          severity: "warning"
        - name: "service_down"
          condition: "up == 0"
          duration: "1m"
          severity: "critical"

  # Networking Configuration
  networking:
    service_mesh:
      enabled: true
      provider: "istio"
      mTLS: true
      traffic_policy:
        timeout: "30s"
        retries: 3
        circuit_breaker:
          consecutive_errors: 5
          interval: "30s"
    
    ingress:
      enabled: true
      class: "nginx"
      tls:
        enabled: true
        cert_manager: true
      rules:
        - host: "squirrel.example.com"
          paths:
            - path: "/"
              service: "squirrel"
              port: 8080
        - host: "api.squirrel.example.com"
          paths:
            - path: "/api"
              service: "squirrel"
              port: 8080

  # Security Configuration
  security:
    network_policies:
      enabled: true
      default_deny: true
      allow_rules:
        - from: "squirrel"
          to: "songbird"
          ports: [8000]
        - from: "squirrel"
          to: "toadstool"
          ports: [8002]
        - from: "squirrel"
          to: "nestgate"
          ports: [8004]
        - from: "squirrel"
          to: "beardog"
          ports: [8006]
    
    pod_security:
      enabled: true
      policy: "restricted"
      run_as_non_root: true
      read_only_root_filesystem: true
      allow_privilege_escalation: false
    
    secrets:
      encryption_at_rest: true
      auto_rotation: true
      rotation_interval: "30d"

  # Backup and Disaster Recovery
  backup:
    enabled: true
    schedule: "0 1 * * *"  # Daily at 1 AM
    retention: "30d"
    storage:
      type: "s3"
      bucket: "squirrel-backups"
      encryption: true
    
    disaster_recovery:
      enabled: true
      rpo: "1h"  # Recovery Point Objective
      rto: "30m"  # Recovery Time Objective
      cross_region_replication: true

  # Environment-Specific Overrides
  environments:
    development:
      replicas: 1
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
      monitoring:
        enabled: false
      security:
        tls:
          enabled: false
    
    staging:
      replicas: 2
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
      monitoring:
        enabled: true
        retention: "7d"
    
    production:
      replicas: 3
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
      monitoring:
        enabled: true
        retention: "30d"
      security:
        tls:
          enabled: true
        mfa:
          enabled: true 
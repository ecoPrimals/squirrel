[package]
name = "dynamic-plugin-loader"
version = "0.1.0"
edition = "2021"
authors = ["DataScienceBioLab"]
description = "Example application that loads and uses dynamic plugins"

[dependencies]
squirrel-plugins = { path = "../.." }
anyhow = "1.0"
tokio = { version = "1.0", features = ["full"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
clap = { version = "4.4", features = ["derive"] }
inquire = "0.6" 
# Maximum cognitive complexity before warning
cognitive-complexity-threshold = 30
# Maximum number of lines in a function
too-many-lines-threshold = 100
# Maximum number of arguments
too-many-arguments-threshold = 7
# Maximum type complexity
type-complexity-threshold = 250
# Raised from defaults: dependency macros (proptest, mockall, test-case)
# generate stack frames and arrays beyond default threshold with no
# actionable span. Our code has zero explicit large stack allocations
# (verified via audit).
stack-size-threshold = 524288
array-size-threshold = 524288

[package]
name = "squirrel-web"
version = "0.1.0"
edition = "2021"
authors.workspace = true
description = "Web interface for the Squirrel system"

[[bin]]
name = "web_server"
path = "src/bin/web_server.rs"

[dependencies]
axum = { version = "0.6", features = ["headers", "macros", "ws"] }
tokio = { version = "1", features = ["full"] }
tower = { workspace = true }
tower-http = { version = "0.4", features = ["cors", "fs"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { workspace = true }
tokio-stream = { version = "0.1", features = ["sync"] }
anyhow = "1.0"
thiserror = "1.0"
async-trait = "0.1"
futures = { workspace = true }
uuid = { version = "1.0", features = ["serde", "v4"] }
chrono = { version = "0.4", features = ["serde"] }
sqlx = { version = "0.7", default-features = false, features = ["runtime-tokio-native-tls", "macros", "uuid", "chrono", "sqlite", "migrate"] }
jsonwebtoken = "8.1"
bcrypt = "0.10"
hyper = "0.14"
regex = "1.8"
http = "0.2"
# Add the libloading dependency for dynamic plugin loading
libloading = { version = "0.8", optional = true }
# Add lazy_static for the plugin type registry
lazy_static = "1.4"

# Squirrel dependencies
squirrel-core = { path = "../core" }
squirrel-mcp = { path = "../mcp" }
squirrel-monitoring = { path = "../monitoring", optional = true, default-features = false }

# Fix for utoipa dependency conflict
# Use a fixed version of utoipa that's compatible with utoipa-swagger-ui
utoipa = { version = "4.2.3", features = ["axum_extras", "yaml"], optional = true }
utoipa-swagger-ui = { version = "4.0.0", features = ["axum"], optional = true }

# Note: The unified plugin system is now directly integrated into the web crate
# as a module, so we don't need the explicit dependency anymore.

[features]
default = ["mock-db", "mock-mcp", "server", "monitoring"]
db = []
mock-db = []
mock-mcp = []
server = []
# Add new features for plugin loading
dynamic-plugins = ["libloading"]
script-plugins = []
# Add a new feature for API documentation
api-docs = ["utoipa", "utoipa-swagger-ui"]
# Add monitoring feature
monitoring = ["squirrel-monitoring"]

[dev-dependencies]
tokio-test = "0.4"
axum-test = "17.2.0"
http-body = "0.4.5"
pretty_assertions = "1.3"
tempfile = "3.8" 
openapi: 3.0.3
info:
  title: Squirrel Web API
  description: |-
    The Squirrel Web API provides external access to the Squirrel platform through HTTP and WebSocket protocols.
    It serves as the primary integration point for client applications, external systems, and user interfaces.
  termsOfService: http://swagger.io/terms/
  contact:
    email: support@squirrelai.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: 1.0.0
externalDocs:
  description: Squirrel AI Coding Assistant Documentation
  url: http://squirrelai.com/docs
servers:
  - url: /api
    description: API base path
tags:
  - name: commands
    description: Command execution and management
  - name: plugins
    description: Plugin system management
  - name: auth
    description: Authentication and authorization
  - name: jobs
    description: Long-running job management
  - name: health
    description: System health and status

paths:
  /commands:
    post:
      tags:
        - commands
      summary: Create and execute a new command
      description: Create and execute a new command with the specified parameters
      operationId: createCommand
      requestBody:
        description: Command to execute
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommandRequest'
      responses:
        '201':
          description: Command created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreateCommandResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []
    get:
      tags:
        - commands
      summary: List user commands
      description: Get a list of commands executed by the current user
      operationId: listUserCommands
      parameters:
        - name: status
          in: query
          description: Filter by command status
          schema:
            type: string
            enum: [queued, running, completed, failed, cancelled]
        - name: command
          in: query
          description: Filter by command name
          schema:
            type: string
        - name: fromDate
          in: query
          description: Filter by creation date (from)
          schema:
            type: string
            format: date-time
        - name: toDate
          in: query
          description: Filter by creation date (to)
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of commands
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CommandSummary'
                      meta:
                        allOf:
                          - $ref: '#/components/schemas/ApiMeta'
                          - type: object
                            properties:
                              pagination:
                                $ref: '#/components/schemas/PaginationMeta'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []

  /commands/available:
    get:
      tags:
        - commands
      summary: List available commands
      description: Get a list of available commands that can be executed
      operationId: listAvailableCommands
      responses:
        '200':
          description: List of available commands
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AvailableCommand'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []

  /commands/{id}:
    get:
      tags:
        - commands
      summary: Get command status
      description: Get the status and details of a specific command execution
      operationId: getCommandStatus
      parameters:
        - name: id
          in: path
          description: Command execution ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Command status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CommandStatusResponse'
        '404':
          description: Command not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []
    delete:
      tags:
        - commands
      summary: Cancel command
      description: Cancel a running command execution
      operationId: cancelCommand
      parameters:
        - name: id
          in: path
          description: Command execution ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Command cancelled successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CommandStatusResponse'
        '404':
          description: Command not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '400':
          description: Command cannot be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []

  /plugins:
    get:
      tags:
        - plugins
      summary: List plugins
      description: Get a list of all installed plugins
      operationId: listPlugins
      responses:
        '200':
          description: List of plugins
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Plugin'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []

  /plugins/components:
    get:
      tags:
        - plugins
      summary: List plugin components
      description: Get a list of all plugin components
      operationId: listPluginComponents
      responses:
        '200':
          description: List of plugin components
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PluginComponent'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []

  /plugins/endpoints:
    get:
      tags:
        - plugins
      summary: List plugin endpoints
      description: Get a list of all plugin endpoints
      operationId: listPluginEndpoints
      responses:
        '200':
          description: List of plugin endpoints
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PluginEndpoint'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []

  /auth/login:
    post:
      tags:
        - auth
      summary: User login
      description: Authenticate a user and get access token
      operationId: loginUser
      requestBody:
        description: User credentials
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  description: Username
                password:
                  type: string
                  format: password
                  description: Password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            description: JWT access token
                          refreshToken:
                            type: string
                            description: Refresh token
                          expiresIn:
                            type: integer
                            description: Token expiration in seconds
                          user:
                            type: object
                            properties:
                              id:
                                type: string
                              username:
                                type: string
                              email:
                                type: string
                              roles:
                                type: array
                                items:
                                  type: string
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /auth/refresh:
    post:
      tags:
        - auth
      summary: Refresh token
      description: Refresh access token using refresh token
      operationId: refreshToken
      requestBody:
        description: Refresh token
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: Refresh token
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            description: New JWT access token
                          refreshToken:
                            type: string
                            description: New refresh token
                          expiresIn:
                            type: integer
                            description: Token expiration in seconds
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /health:
    get:
      tags:
        - health
      summary: Get system health
      description: Get system health status
      operationId: getHealth
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            enum: [healthy, degraded, unhealthy]
                          services:
                            type: object
                            additionalProperties:
                              type: object
                              properties:
                                status:
                                  type: string
                                  enum: [healthy, degraded, unhealthy]
                                message:
                                  type: string
                          version:
                            type: string
                          uptime:
                            type: integer
                            description: Uptime in seconds
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /jobs:
    post:
      tags:
        - jobs
      summary: Create a new job
      description: Create and start a new long-running job
      operationId: createJob
      requestBody:
        description: Job to create
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - parameters
              properties:
                type:
                  type: string
                  description: Job type
                parameters:
                  type: object
                  description: Job parameters
      responses:
        '201':
          description: Job created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            description: Job ID
                          type:
                            type: string
                            description: Job type
                          status:
                            type: string
                            enum: [queued, running, completed, failed, cancelled]
                          statusUrl:
                            type: string
                            description: URL to check job status
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []
    get:
      tags:
        - jobs
      summary: List jobs
      description: Get a list of jobs for the current user
      operationId: listJobs
      parameters:
        - name: status
          in: query
          description: Filter by job status
          schema:
            type: string
            enum: [queued, running, completed, failed, cancelled]
        - name: type
          in: query
          description: Filter by job type
          schema:
            type: string
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: Job ID
                            type:
                              type: string
                              description: Job type
                            status:
                              type: string
                              enum: [queued, running, completed, failed, cancelled]
                            progress:
                              type: number
                              format: float
                              minimum: 0
                              maximum: 1
                              description: Progress (0.0 to 1.0)
                            createdAt:
                              type: string
                              format: date-time
                            startedAt:
                              type: string
                              format: date-time
                              nullable: true
                            completedAt:
                              type: string
                              format: date-time
                              nullable: true
                      meta:
                        allOf:
                          - $ref: '#/components/schemas/ApiMeta'
                          - type: object
                            properties:
                              pagination:
                                $ref: '#/components/schemas/PaginationMeta'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []

  /jobs/{id}/status:
    get:
      tags:
        - jobs
      summary: Get job status
      description: Get the status and details of a specific job
      operationId: getJobStatus
      parameters:
        - name: id
          in: path
          description: Job ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            description: Job ID
                          type:
                            type: string
                            description: Job type
                          status:
                            type: string
                            enum: [queued, running, completed, failed, cancelled]
                          progress:
                            type: number
                            format: float
                            minimum: 0
                            maximum: 1
                            description: Progress (0.0 to 1.0)
                          createdAt:
                            type: string
                            format: date-time
                          startedAt:
                            type: string
                            format: date-time
                            nullable: true
                          completedAt:
                            type: string
                            format: date-time
                            nullable: true
                          error:
                            type: string
                            nullable: true
                            description: Error message if failed
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []

  /jobs/{id}/result:
    get:
      tags:
        - jobs
      summary: Get job result
      description: Get the result of a completed job
      operationId: getJobResult
      parameters:
        - name: id
          in: path
          description: Job ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        description: Job result data (structure varies by job type)
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '400':
          description: Job not completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []

  /jobs/{id}/cancel:
    post:
      tags:
        - jobs
      summary: Cancel job
      description: Cancel a running job
      operationId: cancelJob
      parameters:
        - name: id
          in: path
          description: Job ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job cancelled successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            description: Job ID
                          status:
                            type: string
                            enum: [cancelled]
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '400':
          description: Job cannot be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []

components:
  schemas:
    CreateCommandRequest:
      type: object
      required:
        - command
        - parameters
      properties:
        command:
          type: string
          description: Command name
        parameters:
          type: object
          description: Command parameters

    CreateCommandResponse:
      type: object
      properties:
        id:
          type: string
          description: Command execution ID
        command:
          type: string
          description: Command name
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
          description: Command status
        statusUrl:
          type: string
          description: URL to check command status

    CommandStatusResponse:
      type: object
      properties:
        id:
          type: string
          description: Command execution ID
        command:
          type: string
          description: Command name
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
          description: Command status
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Progress (0.0 to 1.0)
        result:
          type: object
          nullable: true
          description: Command result (if completed)
        error:
          type: string
          nullable: true
          description: Error message (if failed)
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: Start time
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Completion time
        createdAt:
          type: string
          format: date-time
          description: Creation time
        updatedAt:
          type: string
          format: date-time
          description: Last update time

    CommandSummary:
      type: object
      properties:
        id:
          type: string
          description: Command execution ID
        command:
          type: string
          description: Command name
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
          description: Command status
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Progress (0.0 to 1.0)
        createdAt:
          type: string
          format: date-time
          description: Creation time
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: Start time
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Completion time

    AvailableCommand:
      type: object
      properties:
        name:
          type: string
          description: Command name
        description:
          type: string
          description: Command description
        parameterSchema:
          type: object
          description: JSON schema for parameters

    Plugin:
      type: object
      properties:
        id:
          type: string
          description: Plugin ID
        name:
          type: string
          description: Plugin name
        version:
          type: string
          description: Plugin version
        description:
          type: string
          description: Plugin description
        enabled:
          type: boolean
          description: Whether the plugin is enabled
        components:
          type: array
          items:
            type: string
          description: Plugin component IDs

    PluginComponent:
      type: object
      properties:
        id:
          type: string
          description: Component ID
        pluginId:
          type: string
          description: Plugin ID
        name:
          type: string
          description: Component name
        type:
          type: string
          description: Component type
        enabled:
          type: boolean
          description: Whether the component is enabled

    PluginEndpoint:
      type: object
      properties:
        id:
          type: string
          description: Endpoint ID
        pluginId:
          type: string
          description: Plugin ID
        path:
          type: string
          description: Endpoint path
        method:
          type: string
          enum: [GET, POST, PUT, DELETE, PATCH]
          description: HTTP method
        description:
          type: string
          description: Endpoint description

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the request was successful
        data:
          type: object
          nullable: true
          description: Response data
        error:
          nullable: true
          description: Error details (if success is false)
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          default: false
          description: Always false for error responses
        data:
          type: null
          description: Always null for error responses
        error:
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    ApiError:
      type: object
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          nullable: true
          description: Additional error details

    ApiMeta:
      type: object
      properties:
        requestId:
          type: string
          description: Unique request ID
        timestamp:
          type: string
          format: date-time
          description: Request timestamp
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
          nullable: true

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Items per page
        totalItems:
          type: integer
          description: Total number of items
        totalPages:
          type: integer
          description: Total number of pages

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT 
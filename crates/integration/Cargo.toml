[package]
name = "squirrel-integration"
version = "0.1.0"
edition = "2021"
description = "Integration components for the Squirrel system"
authors = ["Squirrel Team"]
license = "MIT OR Apache-2.0"

[dependencies]
# Core dependencies
squirrel-core = { path = "../core" }
squirrel-plugins = { path = "../plugins" }
squirrel-context = { path = "../context" }
squirrel-context-adapter = { path = "../context-adapter" }
squirrel-mcp = { path = "../mcp" }
squirrel-monitoring = { path = "../monitoring" }
squirrel-ai-tools = { path = "../ai-tools" }

# Async runtime
tokio = { version = "1.28", features = ["full"] }
async-trait = "0.1"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utilities
uuid = { version = "1.3", features = ["v4", "serde"] }
tracing = "0.1"
log = "0.4"
secrecy = "0.8"

# Additional dependencies
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures-util = "0.3"
futures = "0.3"
reqwest = { version = "0.11", features = ["json"] }
lru = "0.10"

[features]
default = []
mcp = []
monitoring = []
ai_agent = []

[dev-dependencies]
tokio-test = "0.4"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
mockito = "1.1"
mockall = "0.11.4"

[[example]]
name = "context_mcp_use_case"
path = "examples/context_mcp_use_case.rs"

[[example]]
name = "resilience_monitoring_example"
path = "examples/resilience_monitoring_example.rs"

[[example]]
name = "ai_agent_example"
path = "examples/ai_agent_example.rs"

[[example]]
name = "mcp_ai_tools_example"
path = "examples/mcp_ai_tools_example.rs"

[[example]]
name = "context_ai_tools"
path = "examples/context_ai_tools.rs"

[[example]]
name = "ai_context_enhancement"
path = "examples/ai_context_enhancement.rs"

[[example]]
name = "openai_ui_integration"
path = "examples/openai_ui_integration.rs"

[[test]]
name = "ai_agent_tests"
path = "tests/ai_agent_tests.rs" 
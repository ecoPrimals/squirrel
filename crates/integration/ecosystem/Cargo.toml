[package]
name = "squirrel-ecosystem-integration"
version = "0.1.0"
edition = "2024"
description = "Squirrel ecosystem integration with Songbird and Toadstool"
license = "AGPL-3.0-or-later"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"

[features]
default = []
## songbird/toadstool features removed — Squirrel discovers primals by
## capability at runtime (service_mesh, compute_provider); no compile-time
## primal-name coupling.
[lints]
workspace = true

[package]
name = "squirrel-ecosystem-integration"
version = "0.1.0"
edition = "2024"
description = "Squirrel ecosystem integration with Songbird and Toadstool"
license = "AGPL-3.0-or-later"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"

# Placeholder for future Songbird and Toadstool client dependencies
# songbird-client = { path = "../../../songbird/client", optional = true }
# toadstool-client = { path = "../../../toadstool/client", optional = true }

[features]
default = []
songbird = []
toadstool = [] 
[lints]
workspace = true

[package]
name = "squirrel-toadstool-integration"
version = "0.1.0"
edition = "2021"
description = "Integration between Squirrel MCP and Toadstool Compute Platform"

[dependencies]
# Core dependencies
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
url = { workspace = true }

# HTTP client for toadstool communication
reqwest = { workspace = true, features = ["json"] }

# Time handling
chrono = { workspace = true, features = ["serde"] }

# Encoding
base64 = "0.21"

# Error handling
thiserror = { workspace = true }
universal-error = { path = "../../universal-error" }

# Logging
tracing = { workspace = true }

[features]
default = []
# Integration with toadstool compute platform
toadstool-compute = []
# Sandbox execution via toadstool
sandbox-execution = []

# Will be added when Toadstool client is available
# toadstool-client = { path = "../../../toadstool/client" }

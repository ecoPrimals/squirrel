[package]
name = "mcp-pyo3-bindings"
version = "0.1.0"
edition = "2021"

[lib]
name = "mcp_pyo3_bindings"
crate-type = ["cdylib", "rlib"] # Both dynamic library for Python and Rust library for tests

[dependencies]
# PyO3 for Rust-Python interop - enable all necessary features
pyo3 = { version = "0.20.3", features = ["extension-module", "macros", "chrono", "multiple-pymethods", "auto-initialize"] }

# Add pyo3-asyncio separately (use latest compatible version)
pyo3-asyncio = { version = "0.20.0", features = ["tokio", "tokio-runtime"] }

# Add once_cell for Lazy static
once_cell = "1.19.0"

# Tokio runtime for async
tokio = { version = "1", features = ["rt", "macros", "sync"] } # Ensure necessary tokio features

# Core MCP crate (use correct package name)
squirrel-mcp = { path = "../mcp" }

# Required by mcp::Context or for conversions
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.8", features = ["v4", "serde"] } # Ensure serde feature is enabled
chrono = { version = "0.4", features = ["serde"] } # For DateTime, ensure serde

# Error handling and Logging
anyhow = "1.0"
tracing = "0.1"

# For testing
[dev-dependencies]
tempfile = "3.10"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"

# Add the new test target
[[test]]
name = "sync_process_test"
path = "tests/sync_process_test.rs"
harness = true # Use the default test harness 
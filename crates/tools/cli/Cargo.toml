[package]
name = "squirrel-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Command-line interface for the Squirrel platform"

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
clap = { version = "4.0", features = ["derive"] }
uuid = { version = "1.0", features = ["v4"] }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
env_logger = "0.10"
log = "0.4"
sha2 = "0.10"  # For secure checksums
libloading = "0.8"
colored = "2.0"
prettytable = "0.10"
lazy_static = "1.4"
serde_yaml = "0.9"
directories = "5.0"

# Workspace dependencies
squirrel-core = { path = "../../core/core" }
squirrel-interfaces = { path = "../../core/interfaces" }
squirrel-mcp-config = { path = "../../config" }
reqwest.workspace = true

# Plugin system dependencies  
squirrel-plugins = { path = "../../core/plugins" }
squirrel-commands = { path = "../../services/commands" }

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
tempfile.workspace = true
portpicker = "0.1.1"
criterion.workspace = true

[features]
default = ["commands"]
commands = []
testing = []

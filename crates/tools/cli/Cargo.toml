[package]
name = "squirrel-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "AGPL-3.0-only"
description = "Command-line interface for the Squirrel platform"

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
clap = { version = "4.0", features = ["derive"] }
uuid = { version = "1.0", features = ["v4"] }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
thiserror = "1.0"
tracing = { version = "0.1", features = ["log"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
env_logger = "0.10"
sha2 = "0.10"  # For secure checksums
libloading = "0.8"
colored = "2.0"
prettytable = "0.10"
# lazy_static removed - evolved to std::sync::LazyLock (stable Rust 1.80+)
serde_yaml_ng = "0.10"
directories = "5.0"

# Workspace dependencies
squirrel-core = { path = "../../core/core", version = "0.1.0" }
squirrel-interfaces = { path = "../../core/interfaces", version = "0.1.0" }
squirrel-mcp-config = { path = "../../config", version = "0.1.0" }
# HTTP client (OPTIONAL - for HTTP CLI commands)
# Production uses Unix sockets!
#
# CRYPTO MIGRATION (ecoPrimals: Pure Rust): reqwest 0.12 → rustls 0.23 (pluggable crypto).
# Upgrade path: reqwest 0.12 + rustls-tls-manual-roots-no-provider + custom crypto provider.
# See docs/CRYPTO_MIGRATION.md.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }

# Plugin system dependencies  
squirrel-plugins = { path = "../../core/plugins", version = "0.1.0" }
squirrel-commands = { path = "../../services/commands", version = "0.1.0" }

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
tempfile.workspace = true
portpicker = "0.1.1"
criterion.workspace = true

[features]
# Production default: Pure Rust!
default = ["commands"]
commands = []
# HTTP CLI commands (brings reqwest → ring)
http-commands = ["dep:reqwest"]
testing = []

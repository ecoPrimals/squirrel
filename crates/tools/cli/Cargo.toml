[package]
name = "squirrel-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "AGPL-3.0-or-later"
description = "Command-line interface for the Squirrel platform"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[lints]
workspace = true

[dependencies]
clap = { workspace = true }
uuid.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
thiserror.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
blake3.workspace = true
colored = "2.0"
prettytable = "0.10"
# lazy_static removed - evolved to std::sync::LazyLock (stable Rust 1.80+)
serde_yaml_ng = "0.10"
dirs.workspace = true

universal-constants = { path = "../../universal-constants", version = "0.1.0" }

# Workspace dependencies
# HTTP client (OPTIONAL - for HTTP CLI commands)
# Production uses Unix sockets!
#
# Plugin system dependencies  
squirrel-commands = { path = "../../services/commands", version = "0.1.0" }

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
tempfile.workspace = true
temp-env = "0.3"
portpicker = "0.1.1"
criterion.workspace = true

[features]
# Production default: Pure Rust!
default = ["commands"]
commands = []
## http-commands removed (stadial gate: reqwest lockfile ghost eliminated)
testing = []

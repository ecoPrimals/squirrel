[package]
name = "squirrel-ai-tools"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "AGPL-3.0-only"
description = "AI tools for Squirrel platform"

[lints]
workspace = true

[dependencies]
# Core async runtime
tokio = { version = "1.0", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
async-trait = "0.1"
futures = "0.3"
bytes = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
anyhow = "1.0"

# HTTP client for AI services (OPTIONAL - for dev/testing only!)
# Production uses Unix sockets → Songbird (Pure Rust!)
reqwest = { version = "0.11", default-features = false, features = ["json", "stream", "rustls-tls"], optional = true }
url = "2.5"

# Logging and tracing
tracing = { version = "0.1", features = ["log"] }

# AI service clients (OPTIONAL - for dev/testing only!)
# Production delegates to Songbird via Unix sockets!
openai = { version = "1.1", default-features = false, features = ["rustls"], optional = true }
anthropic-sdk = { version = "0.1", optional = true }

# CRITICAL FIX: Add missing config dependency
squirrel-mcp-config = { path = "../../config" }

# IPC client from universal patterns (primal autonomy - no shared external IPC crates!)
universal-patterns = { path = "../../universal-patterns" }

# Universal error system
universal-error = { path = "../../universal-error" }

# Universal constants (socket paths, SLOs, ports)
universal-constants = { path = "../../universal-constants" }

# Web framework for API (OPTIONAL - for HTTP API routes only)
axum = { version = "0.7", features = ["json"], optional = true }
tower = { version = "0.4", optional = true }
tower-http = { version = "0.5", features = ["cors", "trace"], optional = true }

# Configuration
config = "0.13"
toml = "0.8"

# Logging
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Security
secrecy = "0.8"

# File system
dirs = "5.0"
tempfile = "3.0"

# lazy_static removed - evolved to std::sync::LazyLock (stable Rust 1.80+)

# CLI
clap = { version = "4.0", features = ["derive"] }

# Additional dependencies for native provider
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11"

[features]
# Production default: capability-based AI (Pure Rust via Unix sockets!)
default = ["capability-ai"]

# Capability-based AI (TRUE PRIMAL - Pure Rust!)
# Delegates to Songbird via Unix sockets
# NO reqwest, NO ring!
capability-ai = []

# Direct HTTP to AI vendors (DEV/TESTING ONLY!)
# Brings reqwest → rustls → ring
# Use for development without Songbird
direct-http = ["dep:reqwest", "dep:openai", "dep:anthropic-sdk"]

# Legacy feature flags (kept for compatibility)
anthropic = ["direct-http"]
openai = ["direct-http"]
gemini = ["direct-http"]
local = []
testing = []

[[example]]
name = "hierarchical_routing_demo"
path = "examples/hierarchical_routing_demo.rs"

[[bin]]
name = "ai_tools_demo"
path = "src/bin/ai_tools_demo.rs" 

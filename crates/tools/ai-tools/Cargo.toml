[package]
name = "squirrel-ai-tools"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "AGPL-3.0-or-later"
description = "AI tools for Squirrel platform"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[lints]
workspace = true

[dependencies]
# Core async runtime
tokio.workspace = true
tokio-stream.workspace = true
async-trait.workspace = true
futures.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
thiserror.workspace = true
anyhow.workspace = true

# HTTP client for AI services (OPTIONAL - for dev/testing only!)
# Production uses Unix sockets → Songbird (Pure Rust!)
#
# CRYPTO MIGRATION (ecoPrimals: Pure Rust): reqwest 0.12 → rustls 0.23 (pluggable crypto).
# Upgrade path: reqwest 0.12 + rustls-tls-manual-roots-no-provider + custom crypto provider.
# See docs/CRYPTO_MIGRATION.md.
reqwest = { workspace = true, optional = true }

# Logging and tracing
tracing.workspace = true

# AI service clients (OPTIONAL - for dev/testing only!)
# Production delegates to Songbird via Unix sockets!
# anthropic-sdk REMOVED: pulls reqwest with default native-tls (chimeric C dep).
# Direct HTTP providers return Err("not yet implemented") - use capability_ai instead.
openai = { workspace = true, optional = true }

# IPC client from universal patterns (primal autonomy - no shared external IPC crates!)
universal-patterns.workspace = true

# Universal error system
universal-error.workspace = true

# Universal constants (socket paths, SLOs, ports)
universal-constants.workspace = true

# Web framework for API (OPTIONAL - for HTTP API routes only)
axum = { workspace = true, optional = true }

# Configuration (TOML is ecosystem standard format)
toml.workspace = true

# Logging
tracing-subscriber = { workspace = true, features = ["env-filter"] }

# File system
dirs.workspace = true
tempfile.workspace = true

# lazy_static removed - evolved to std::sync::LazyLock (stable Rust 1.80+)

# CLI
clap.workspace = true

# Additional dependencies for native provider
rand.workspace = true

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11"
temp-env = "0.3"

[features]
# Production default: capability-based AI (Pure Rust via Unix sockets!)
default = ["capability-ai"]

# Capability-based AI (TRUE PRIMAL - Pure Rust!)
# Delegates to Songbird via Unix sockets
# NO reqwest, NO ring!
capability-ai = []

# Direct HTTP to AI vendors (DEV/TESTING ONLY!)
# Brings reqwest → rustls → ring
# Use for development without Songbird
direct-http = ["dep:reqwest", "dep:openai"]

# Legacy feature flags (kept for compatibility)
anthropic = ["direct-http"]
openai = ["direct-http"]
gemini = ["direct-http"]
local = []
testing = []

[[bin]]
name = "ai_tools_demo"
path = "src/bin/ai_tools_demo.rs" 

[package]
name = "squirrel-ai-tools"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "AI tools for Squirrel platform"

[lints]
workspace = true

[dependencies]
# Core async runtime
tokio = { version = "1.0", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
async-trait = "0.1"
futures = "0.3"
bytes = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
anyhow = "1.0"

# HTTP client for AI services
reqwest = { version = "0.11", features = ["json", "stream"] }
url = "2.5"

# Logging and tracing
tracing = "0.1"
log = "0.4"

# AI service clients
openai = "1.1"
anthropic-sdk = "0.1"

# CRITICAL FIX: Add missing config dependency
squirrel-mcp-config = { path = "../../config" }

# Universal error system
universal-error = { path = "../../universal-error" }

# Web framework for API
axum = { version = "0.7", features = ["json"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Configuration
config = "0.13"
toml = "0.8"

# Logging
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Security
secrecy = "0.8"

# File system
dirs = "5.0"
tempfile = "3.0"

# Lazy static
lazy_static = "1.4"

# CLI
clap = { version = "4.0", features = ["derive"] }

# Additional dependencies for native provider
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11"

[features]
default = ["anthropic", "openai", "gemini", "local"]
anthropic = []
openai = []
gemini = []
local = []
testing = []

[[example]]
name = "hierarchical_routing_demo"
path = "examples/hierarchical_routing_demo.rs"

[[bin]]
name = "ai_tools_demo"
path = "src/bin/ai_tools_demo.rs" 

[package]
name = "squirrel-ai-tools"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core dependencies
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"
futures = "0.3"
futures-util = "0.3"
tokio-stream = "0.1"
tracing = "0.1"

# HTTP client
reqwest = { version = "0.11", features = ["json", "stream"] }
bytes = "1.0"

# Web framework for API
axum = { version = "0.7", features = ["json"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Configuration
config = "0.13"
toml = "0.8"

# Logging
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Security
secrecy = "0.8"

# File system
dirs = "5.0"
tempfile = "3.0"

# Lazy static
lazy_static = "1.4"

# CLI
clap = { version = "4.0", features = ["derive"] }

# Additional dependencies for native provider
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11"

[features]
default = ["anthropic", "openai", "gemini", "local"]
anthropic = []
openai = []
gemini = []
local = []
testing = []

[[example]]
name = "hierarchical_routing_demo"
path = "examples/hierarchical_routing_demo.rs"

[[bin]]
name = "ai_tools_demo"
path = "src/bin/ai_tools_demo.rs" 

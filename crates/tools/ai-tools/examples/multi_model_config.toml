# Multi-Model AI Dispatch Configuration Example
# This file shows how to configure the AI tools library for multi-model workflows

[dispatcher]
# Routing strategy: FirstMatch, HighestPriority, LowestLatency, LowestCost, BestFit, RoundRobin
routing_strategy = "BestFit"
default_provider = "local"
allow_remote_routing = true
routing_timeout_ms = 30000
max_routing_attempts = 3

# Prefer local models for sensitive data processing
prefer_local_for_sensitive = true
# Prefer API models for complex reasoning tasks
prefer_api_for_complex = true

[local]
# Default local model to use
default_model = "llama3-8b"
enable_ollama = true
enable_native = false  # Not implemented yet

[local.ollama]
# Ollama server configuration
base_url = "http://localhost:11434"
timeout_seconds = 30
auto_discover_models = true
keep_alive = true

# Models to ensure are available
models = [
    "llama3-8b",
    "llama3-70b",
    "codellama",
    "mistral",
    "phi3"
]

[local.native]
# Native Rust model implementations (future)
models_directory = "./models"
max_loaded_models = 3
use_gpu = true
gpu_device_ids = []  # Empty means use all available
cpu_threads = 8

[local.resource_management]
# Resource limits and management
max_memory_mb = 16384  # 16GB
max_gpu_memory_mb = 24576  # 24GB
auto_unload_unused = true
unload_timeout_seconds = 300  # 5 minutes
preload_frequent_models = false

[api_providers]
# API provider configurations

[api_providers.openai]
# OpenAI configuration
enabled = true
# api_key is read from environment variable OPENAI_API_KEY
default_model = "gpt-3.5-turbo"
timeout_seconds = 30

[api_providers.anthropic]
# Anthropic configuration  
enabled = true
# api_key is read from environment variable ANTHROPIC_API_KEY
default_model = "claude-3-haiku-20240307"
timeout_seconds = 45

[api_providers.gemini]
# Google Gemini configuration
enabled = false  # Not fully implemented yet
# api_key is read from environment variable GEMINI_API_KEY
default_model = "gemini-pro"
timeout_seconds = 30

[workflows]
# Default model assignments for different workflow types

[workflows.default_models]
# Task type to model mappings
text_generation = "gpt-3.5-turbo"
code_generation = "gpt-4"
sensitive_text = "llama3-8b"  # Local model for sensitive data
analysis = "claude-3-sonnet-20240229"
quick_response = "llama3-8b"
creative_writing = "gpt-4"

[workflows.routing_rules]
# Automatic routing rules

[[workflows.routing_rules.rules]]
# Route sensitive data to local models
condition = "contains_sensitive_data"
preferred_provider = "local"
preferred_model = "llama3-8b"
priority = 95

[[workflows.routing_rules.rules]]
# Route complex tasks to powerful API models
condition = "complexity_score > 80"
preferred_provider = "openai"
preferred_model = "gpt-4"
max_cost_tier = "High"
priority = 90

[[workflows.routing_rules.rules]]
# Route code generation to specialized models
condition = "task_type == 'code_generation'"
preferred_provider = "openai"
preferred_model = "gpt-4"
priority = 85

[[workflows.routing_rules.rules]]
# Route quick queries to fast local models
condition = "max_tokens < 200"
preferred_provider = "local"
preferred_model = "llama3-8b"
max_latency_ms = 5000
priority = 80

[monitoring]
# Monitoring and logging configuration
enable_metrics = true
enable_tracing = true
log_level = "info"
metrics_export_interval_seconds = 60

[monitoring.performance_tracking]
# Track performance metrics
track_latency = true
track_token_usage = true
track_cost = true
track_success_rate = true

[security]
# Security configuration
encrypt_sensitive_requests = true
log_sanitization = true
geo_restrictions = []  # Empty means no restrictions

[security.data_handling]
# Data handling policies
retain_request_logs = false
retain_response_logs = false
anonymize_logs = true
max_log_retention_days = 7 
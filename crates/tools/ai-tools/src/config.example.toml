# Squirrel AI Tools Configuration
# This is an example configuration file showing the supported options.
# Place your actual config at ~/.config/squirrel-ai-tools/config.toml

# OpenAI API Key - Used to access OpenAI's GPT models
openai_api_key = "sk-your-openai-key-here"

# Anthropic API Key - Used to access Claude models
anthropic_api_key = "sk-ant-your-anthropic-key-here"

# Google Gemini API Key - Used to access Google Gemini models
gemini_api_key = "your-gemini-key-here"

# AI Service Endpoints (Optional)
# Uncomment and modify these if you need to use alternative endpoints
# openai_endpoint = "https://api.openai.com/v1"
# anthropic_endpoint = "https://api.anthropic.com/v1"
# gemini_endpoint = "https://generativelanguage.googleapis.com/v1"

# Model Configuration (Optional)
# Uncomment to set default models per provider
# default_openai_model = "gpt-4"
# default_anthropic_model = "claude-3-opus-20240229"
# default_gemini_model = "gemini-1.5-pro-latest"

# Rate Limiting Configuration (Optional)
# Uncomment to adjust rate limiting behavior
# max_requests_per_minute = 60
# retry_on_rate_limit = true
# max_retries = 3
# retry_delay_ms = 2000 
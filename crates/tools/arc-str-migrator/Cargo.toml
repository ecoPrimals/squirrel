[package]
name = "arc-str-migrator"
version = "0.1.0"
edition = "2021"
authors = ["Squirrel AI Ecosystem"]
description = "Automated migration tool for converting HashMap<String,> patterns to Arc<str> optimization"

[dependencies]
regex = "1.10"
walkdir = "2.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.4", features = ["derive"] }
colored = "2.1"
indicatif = "0.17"
rayon = "1.8"
anyhow = "1.0"

[dev-dependencies]
tempfile = "3.8" 
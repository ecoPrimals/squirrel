[package]
name = "universal-patterns"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Universal patterns for ecosystem integration"

[lints]
workspace = true

[dependencies]
# Core async and serialization
tokio.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
thiserror.workspace = true
anyhow.workspace = true
futures = "0.3"

# HTTP and networking
reqwest.workspace = true
url = { version = "2.5", features = ["serde"] }

# Logging and tracing
tracing.workspace = true
log.workspace = true

# Configuration management
config = "0.14"
serde_yaml = "0.9"
dirs = "5.0"

# Ecosystem dependencies
ecosystem-api = { path = "../ecosystem-api" }

# CRITICAL FIX: Add missing config dependency
squirrel-mcp-config = { path = "../config" }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.0"
wiremock = "0.5"
assert_matches = "1.5"

[features]
default = ["config-management", "security", "orchestration"]
config-management = []
security = []
orchestration = []
testing = []

 
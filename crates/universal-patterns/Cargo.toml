[package]
name = "universal-patterns"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "AGPL-3.0-or-later"
description = "Universal patterns for ecosystem integration"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[lints]
workspace = true

[dependencies]
# Core async and serialization
tokio.workspace = true

# Internal dependencies
universal-constants = { path = "../universal-constants", version = "0.1.0" }
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
thiserror.workspace = true
anyhow.workspace = true
futures = "0.3"

# HTTP and networking (OPTIONAL - for HTTP patterns)
# Production uses Unix sockets!
url = { version = "2.5", features = ["serde"] }

# Logging and tracing
tracing.workspace = true

# Configuration management
config = "0.14"
serde_yaml_ng = "0.10"
dirs = "5.0"

# Ecosystem dependencies
ecosystem-api = { path = "../ecosystem-api", version = "0.1.0" }

# CRITICAL FIX: Add missing config dependency
squirrel-mcp-config = { path = "../config", version = "0.1.0" }

# Security: zeroize for sensitive data
zeroize.workspace = true

# Cryptography: blake3 hashing, rand for key generation
blake3.workspace = true
rand.workspace = true

# Zero-copy bytes at IPC/transport boundaries (wateringHole)
bytes = { version = "1.5", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.0"
wiremock = "0.5"
assert_matches = "1.5"
proptest.workspace = true
serial_test = "3.0"
temp-env = "0.3"
toml = "0.8"

[features]
# Production default: Pure Rust patterns
default = ["config-management", "security", "orchestration"]
config-management = []
security = []
orchestration = []
## http-patterns removed (stadial gate: reqwest lockfile ghost eliminated)
testing = []

 
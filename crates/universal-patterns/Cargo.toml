[package]
name = "universal-patterns"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "AGPL-3.0-only"
description = "Universal patterns for ecosystem integration"

[lints]
workspace = true

[dependencies]
# Core async and serialization
tokio.workspace = true
async-trait.workspace = true

# Internal dependencies
universal-constants = { path = "../universal-constants" }
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
thiserror.workspace = true
anyhow.workspace = true
futures = "0.3"

# HTTP and networking (OPTIONAL - for HTTP patterns)
# Production uses Unix sockets!
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"], optional = true }
url = { version = "2.5", features = ["serde"] }

# Logging and tracing
tracing.workspace = true
log.workspace = true

# Configuration management
config = "0.14"
serde_yaml = "0.9"
dirs = "5.0"

# Ecosystem dependencies
ecosystem-api = { path = "../ecosystem-api" }

# CRITICAL FIX: Add missing config dependency
squirrel-mcp-config = { path = "../config" }

# Security: zeroize for sensitive data
zeroize.workspace = true

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.0"
wiremock = "0.5"
assert_matches = "1.5"
proptest = "1.4"

[features]
# Production default: Pure Rust patterns
default = ["config-management", "security", "orchestration"]
config-management = []
security = []
orchestration = []
# HTTP patterns (brings reqwest → ring)
http-patterns = ["dep:reqwest"]
testing = []

 
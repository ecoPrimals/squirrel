[package]
name = "squirrel-rule-system"
version = "0.1.0"
edition = "2021"
description = "Rule System for the Squirrel Context Management System"
authors = ["DataScienceBioLab"]

[dependencies]
tokio = { version = "1.28", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = "0.3"
glob = "0.3"
lru = "0.10"
notify = "5.0"
toml = "0.7"
yaml-rust = "0.4"
regex = "1.8"
sqlx = { version = "0.7", features = ["runtime-tokio-native-tls", "sqlite"], optional = true }
serde_yaml = "0.9"

# Internal crate dependencies
squirrel-core = { path = "../core" }
squirrel-context = { path = "../context" }
squirrel-context-adapter = { path = "../context-adapter" }
squirrel-interfaces = { path = "../interfaces" }
squirrel-plugins = { path = "../plugins" }

[features]
default = []
persistence = ["sqlx"]
watcher = []

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.5" 
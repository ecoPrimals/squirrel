# Example Port Configuration for Squirrel Ecosystem
# This configuration file demonstrates how to configure ports for all services
# in a way that Songbird can manage dynamically.

# Environment setting - affects default strategies
ENVIRONMENT = "development"  # or "production"

# Songbird Integration
SONGBIRD_INTEGRATION = "true"  # Enable Songbird port management

# Development Settings
DEV_USE_LOCALHOST = "true"
DEV_AUTO_DISCOVERY = "true"
DEV_BASE_PORT = "8080"
DEV_PORT_OFFSET = "0"

# Squirrel Service Ports
SQUIRREL_PORT = "8080"           # Main API port
SQUIRREL_WS_PORT = "8081"        # WebSocket port
SQUIRREL_HEALTH_PORT = "8082"    # Health check port
SQUIRREL_METRICS_PORT = "9090"   # Metrics port
SQUIRREL_ADMIN_PORT = "8083"     # Admin interface port
SQUIRREL_MCP_PORT = "8444"       # MCP protocol port
SQUIRREL_AI_PORT = "8445"        # AI coordination port
SQUIRREL_CHAOS_PORT = "8446"     # Chaos engineering port

# External Primal Service Ports
SONGBIRD_PORT = "8080"           # Songbird service mesh
BEARDOG_PORT = "8443"            # BearDog security (HTTPS)
TOADSTOOL_PORT = "8500"          # ToadStool compute
NESTGATE_PORT = "8501"           # NestGate storage
BIOMEOS_PORT = "5000"            # BiomeOS orchestration

# Port Allocation Configuration
[port_allocation]
strategy = "environment_based"   # Fixed, Dynamic, SongbirdManaged, EnvironmentBased
retry_count = 5
bind_timeout_secs = 30
conflict_detection = true

# Development Port Configuration
[development]
use_localhost = true
auto_discovery = true
base_port = 8080
port_offset = 0

# Production Port Configuration
[production]
min_port = 8000
max_port = 9999
explicit_assignment = true

# Service-specific port ranges for production
[production.service_ranges]
web = { start = 8000, end = 8099 }
api = { start = 8100, end = 8199 }
internal = { start = 8200, end = 8299 }
monitoring = { start = 9000, end = 9099 }

# Reserved ports (will not be allocated)
[production.reserved_ports]
reserved = [22, 80, 443, 3306, 5432, 6379, 27017]

# Service-specific Health Check Configuration
[health_checks]

[health_checks.squirrel_api]
path = "/health"
expected_status = 200
interval_secs = 30
timeout_secs = 5
failure_threshold = 3
success_threshold = 2

[health_checks.songbird]
path = "/health"
expected_status = 200
interval_secs = 15
timeout_secs = 3
failure_threshold = 2
success_threshold = 1

# Load Balancing Configuration
[load_balancing]

[load_balancing.squirrel_api]
strategy = "round_robin"
health_check_required = true
session_affinity = false

[load_balancing.beardog]
strategy = "least_connections"
health_check_required = true
session_affinity = true

# Songbird Metadata for Service Discovery
[songbird_metadata]

[songbird_metadata.squirrel_api]
service_type = "api_gateway"
scaling_group = "core"
priority = "high"
deployment_zone = "us-west-2a"

[songbird_metadata.chaos]
service_type = "internal_tool"
scaling_group = "testing"
priority = "low"
deployment_zone = "us-west-2b"

# Example usage in different environments:

# Development - Uses environment variables with localhost defaults
# Production - Songbird manages all port allocation dynamically
# Testing - Uses fixed ports for reproducible testing

# Example service URL generation:
# Development: http://localhost:8080/api/v1/...
# Production: https://squirrel-api-abc123.internal.domain.com/api/v1/...
# Songbird managed: http://10.0.1.45:34521/api/v1/... (dynamic allocation) 
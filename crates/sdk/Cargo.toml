[package]
name = "squirrel-sdk"
version = "1.0.0"
edition = "2024"
authors = ["Squirrel Team <team@squirrel.dev>"]
description = "SDK for developing Squirrel MCP plugins"
license = "AGPL-3.0-only"
repository = "https://github.com/squirrel-org/squirrel"
documentation = "https://docs.squirrel.dev/sdk"
keywords = ["mcp", "plugin", "wasm", "webassembly"]
categories = ["development-tools", "wasm", "api-bindings"]

[features]
default = ["console"]
console = ["console_error_panic_hook"]
http = ["reqwest"]
fs = []
storage = []
web = []
mcp = []
config = ["squirrel-mcp-config"]

[dependencies]
# Core WASM dependencies
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "console",
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "Event",
    "EventTarget",
    "File",
    "FileReader",
    "Blob",
    "BlobPropertyBag",
    "Url",
    "Request",
    "RequestInit",
    "RequestMode",
    "Response",
    "Headers",
    "Storage",
    "Location",
    "History",
    "Navigator",
    "Performance",
    "Worker",
    "MessageEvent",
    "ErrorEvent",
    "CustomEvent",
    "KeyboardEvent",
    "MouseEvent",
    "TouchEvent",
    "WheelEvent",
    "FocusEvent",
    "InputEvent",
    "HtmlInputElement",
    "HtmlTextAreaElement",
    "HtmlSelectElement",
    "HtmlFormElement",
    "HtmlButtonElement",
    "HtmlAnchorElement",
    "HtmlImageElement",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    "ImageData",
    "DomRect",
    "WebSocket",
    "MessagePort",
    "Notification",
    "AudioContext",
    "AudioNode",
    "CryptoKey",
    "SubtleCrypto",
    "Crypto",
    "TextEncoder",
    "TextDecoder",
    "ReadableStream",
    "WritableStream",
    "XmlHttpRequest",
    "ProgressEvent",
    "CloseEvent",
    "HashChangeEvent",
    "PopStateEvent",
    "StorageEvent",
    "BeforeUnloadEvent",
] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
serde_json = "1.0"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Async runtime
futures = "0.3"
futures-util = "0.3"
tokio = { version = "1.0", features = ["full"] }

# Logging
tracing = "0.1"

# WebSocket support
tokio-tungstenite = "0.20"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
semver = "1.0"

# Optional dependencies
console_error_panic_hook = { version = "0.1", optional = true }
# CRYPTO MIGRATION (ecoPrimals: Pure Rust): reqwest 0.12 → rustls 0.23 (pluggable crypto).
# Upgrade path: reqwest 0.12 + rustls-tls-manual-roots-no-provider. See docs/CRYPTO_MIGRATION.md.
reqwest = { version = "0.12", optional = true, default-features = false, features = ["json", "rustls-tls"] }
squirrel-mcp-config = { path = "../config", optional = true }

# Universal error system
universal-error = { path = "../universal-error" }

# Network discovery (ports, bind address)
universal-constants = { path = "../universal-constants" }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[lib]
# rlib for all targets; cdylib dropped on musl/native (use wasm-pack for wasm cdylib builds)
crate-type = ["rlib"]

[lints]
workspace = true

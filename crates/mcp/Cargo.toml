[package]
name = "squirrel-mcp"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Machine Context Protocol (MCP) implementation for Squirrel"
license.workspace = true

[features]
default = []  # Removed legacy-transport entirely
full = []     # Updated full features list
di-tests = []
metrics = []
tcp = []     # TCP transport implementation
websocket = []
stdio = []
memory = []
# Compression features
zstd = ["dep:zstd"]
gzip = ["dep:flate2"]
lz4 = ["dep:lz4"]
# Removed plugins integration feature to break circular dependency

# TLS Features
native-tls = []
rustls-tls-native-roots = []
rustls-tls-webpki-roots = []

[dependencies]
# Core dependencies
tokio = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
async-std = "1.12.0"  # Add async_std for task::block_on
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sled = { workspace = true }
ring = { workspace = true }
bytes = { workspace = true }
futures-util = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
rand = { workspace = true }
anyhow = { workspace = true }
sysinfo = { workspace = true }
opentelemetry = { workspace = true, features = ["metrics"] }
opentelemetry_sdk = { workspace = true, features = ["metrics"] }
reqwest = { workspace = true }
log = { workspace = true }
semver = { workspace = true }
lru = { workspace = true }
regex = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
base64 = "0.21"
socket2 = "0.5.3"
tokio-tungstenite = { version = "0.17", features = ["native-tls"] }
flate2 = { version = "1.0", optional = true }
zstd = { version = "0.12.3", optional = true }
lz4 = { version = "1.24.0", optional = true }
bincode = "1.3.3"
blake3 = "1.5.0"  # Added for cryptographic hashing
url = { version = "2.5", features = ["serde"] }
libloading = "0.8"  # Added for dynamic loading of plugin libraries
jsonwebtoken = "8.3.0"  # Added for JWT token management
once_cell = "1.19.0"

# Shared squirrel dependencies
squirrel-interfaces = { path = "../interfaces" }
squirrel-core = { path = "../core", features = ["core"] }
squirrel-context = { path = "../context" }

# Remove the plugins dependency from regular dependencies
# squirrel-plugins = { path = "../plugins", features = ["core"], optional = true }

[dev-dependencies]
tokio-test = { workspace = true }
tempfile = { workspace = true }
mockall = { workspace = true }
# Move plugins to dev-dependencies only for tests
squirrel-plugins = { path = "../plugins", features = ["core"] }

# Additional dev-dependencies for examples
async-trait = { workspace = true }
tokio = { workspace = true, features = ["full", "macros", "rt-multi-thread"] }

[lints]
workspace = true

[lib]
name = "squirrel_mcp"
path = "src/lib.rs"

[[bin]]
name = "test_memory_transport"
path = "src/bin/test_memory_transport.rs"

[[bin]]
name = "rbac_test"
path = "src/bin/rbac_test.rs"

[[example]]
name = "tool_lifecycle_management"
path = "examples/tool_lifecycle_management.rs"

[[example]]
name = "connection_health_monitor"
path = "examples/connection_health_monitor.rs"

[[example]]
name = "core_integration"
path = "examples/core_integration.rs"

[[example]]
name = "observability_example"
path = "examples/observability_example.rs"

[[example]]
name = "plugin_usage"
path = "examples/plugin_usage.rs"

[[example]]
name = "resource_state_plugin"
path = "examples/resource_state_plugin.rs"

[[example]]
name = "simple_journal"
path = "examples/simple_journal.rs"

[[example]]
name = "transaction_example"
path = "examples/transaction_example.rs"

[[example]]
name = "rbac_independent_test"
path = "examples/rbac_independent_test.rs"

[[example]]
name = "monitoring_integration"
path = "examples/monitoring_integration.rs"

[[example]]
name = "monitoring_api_test"
path = "examples/monitoring_api_test.rs"

[[example]]
name = "resilience_monitoring_integration"
path = "examples/integration/resilience_monitoring_integration.rs"

[[example]]
name = "resilience_integration"
path = "examples/resilience_integration.rs"
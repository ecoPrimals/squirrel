[package]
name = "squirrel-mcp"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Machine Context Protocol (MCP) implementation for Squirrel"
license.workspace = true

[features]
default = ["legacy-transport"]
legacy-transport = []  # Enable legacy transport module (deprecated, will be removed in a future release)
full = ["legacy-transport"]
di-tests = []
metrics = []
# Compression features
zstd = []
gzip = ["flate2"]
lz4 = []
# Removed plugins integration feature to break circular dependency

[dependencies]
# Core dependencies
tokio = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
async-std = "1.12.0"  # Add async_std for task::block_on
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sled = { workspace = true }
ring = { workspace = true }
bytes = { workspace = true }
futures-util = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
rand = { workspace = true }
anyhow = { workspace = true }
sysinfo = { workspace = true }
opentelemetry = { workspace = true, features = ["metrics"] }
opentelemetry_sdk = { workspace = true, features = ["metrics"] }
reqwest = { workspace = true }
log = { workspace = true }
semver = { workspace = true }
lru = { workspace = true }
regex = { workspace = true }
sha2 = "0.10.8"
hex = "0.4.3"
base64 = "0.21"
socket2 = "0.5.3"
tokio-tungstenite = "0.20.1"
native-tls = "0.2.11"
flate2 = { version = "1.0", optional = true }

# Shared squirrel dependencies
squirrel-interfaces = { path = "../interfaces" }
squirrel-core = { path = "../core", features = ["core"] }
squirrel-context = { path = "../context" }

# Remove the plugins dependency from regular dependencies
# squirrel-plugins = { path = "../plugins", features = ["core"], optional = true }

[dev-dependencies]
tokio-test = { workspace = true }
tempfile = { workspace = true }
mockall = { workspace = true }
# Move plugins to dev-dependencies only for tests
squirrel-plugins = { path = "../plugins", features = ["core"] }

[lints]
workspace = true

[lib]
name = "squirrel_mcp"
path = "src/lib.rs"

[[bin]]
name = "test_memory_transport"
path = "src/bin/test_memory_transport.rs"
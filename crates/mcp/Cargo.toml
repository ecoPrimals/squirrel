[package]
name = "squirrel-mcp"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Machine Context Protocol (MCP) implementation for Squirrel"
license.workspace = true

[features]
default = ["tcp", "stdio", "websocket"]
full = ["tcp", "stdio", "websocket", "metrics", "gzip", "lz4", "zstd", "rustls-tls-native-roots", "dashboard"]
metrics = []
dashboard = []  # Dashboard visualization support
tcp = []
stdio = []
websocket = []
gzip = ["dep:flate2"]
lz4 = ["dep:lz4"]
zstd = ["dep:zstd"]
native-tls = ["tokio-tungstenite/native-tls", "reqwest/native-tls"]
rustls-tls-native-roots = ["tokio-tungstenite/rustls-tls-native-roots", "reqwest/rustls-tls"]
rustls-tls-webpki-roots = ["tokio-tungstenite/rustls-tls-webpki-roots", "reqwest/rustls-tls"]
di-tests = []  # Dependency injection test helpers
# Use interfaces-based approach to avoid circular dependencies
command-registry = ["dep:squirrel-commands"]  # Feature to enable command registry functionality

[dependencies]
# Core dependencies
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
futures = { workspace = true }
async-trait = { workspace = true }
async-std = "1.12.0"  # Add async_std for task::block_on
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sled = { workspace = true }
ring = { workspace = true }
bytes = { workspace = true }
futures-util = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
rand = { workspace = true }
anyhow = { workspace = true }
sysinfo = { workspace = true }
opentelemetry = { workspace = true, features = ["metrics"] }
opentelemetry_sdk = { workspace = true, features = ["metrics"] }
reqwest = { workspace = true }
log = { workspace = true }
semver = { workspace = true }
lru = { workspace = true }
regex = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
base64 = "0.21"
socket2 = "0.5.3"
tokio-tungstenite = { version = "0.17", features = ["native-tls"] }
flate2 = { version = "1.0", optional = true }
zstd = { version = "0.12.3", optional = true }
lz4 = { version = "1.24.0", optional = true }
bincode = "1.3.3"
blake3 = "1.5.0"  # Added for cryptographic hashing
url = { version = "2.5", features = ["serde"] }
libloading = "0.8"  # Added for dynamic loading of plugin libraries
jsonwebtoken = "8.3.0"  # Added for JWT token management
once_cell = "1.19.0"

# Command registry related dependencies
squirrel-commands = { path = "../commands", optional = true }

# Shared squirrel dependencies
squirrel-interfaces = { path = "../interfaces" }
squirrel-core = { path = "../core", features = ["core"] }
squirrel-context = { path = "../context" }
# dashboard-core dependency removed since we're using a mock

# gRPC and Protobuf (Re-enabled)
tonic = { version = "0.12", features = ["tls", "transport", "server", "codegen", "prost"] }
prost = "0.13.1"
prost-types = "0.13.1"

# Remove the plugins dependency from regular dependencies
# squirrel-plugins = { path = "../plugins", features = ["core"], optional = true }

# Add structopt for command-line argument parsing
structopt = "0.3.25"

# Add hyper and tower as dependencies
hyper = { version = "0.14", features = ["full"] }
tower = "0.4"

tokio-stream = { version = "0.1", features = ["sync"] }

clap = { version = "4.4", features = ["derive"] }

# Add async-stream dependency
async-stream = "0.3"

[dev-dependencies]
tokio-test = { workspace = true }
tempfile = { workspace = true }
mockall = { workspace = true }
reqwest = { version = "0.11", features = ["json"] }
# Move plugins to dev-dependencies only for tests
squirrel-plugins = { path = "../plugins", features = ["core"] }
# Add CLI as a dev-dependency for tests
squirrel-cli = { path = "../cli", features = ["commands"] }

# Additional dev-dependencies for examples
async-trait = { workspace = true }
tokio = { workspace = true, features = ["full", "macros", "rt-multi-thread"] }

# Build dependency for tonic/prost (Re-enabled, but build.rs is disabled)
[build-dependencies]
tonic-build = { version = "0.12.0", features = ["prost"] }
prost-build = "0.13.1"

[lints]
workspace = true

[lib]
name = "squirrel_mcp"
path = "src/lib.rs"

[[bin]]
name = "test_memory_transport"
path = "src/bin/test_memory_transport.rs"

[[bin]]
name = "rbac_test"
path = "src/bin/rbac_test.rs"

[[example]]
name = "tool_lifecycle_management"
path = "examples/tool_lifecycle_management.rs"

[[example]]
name = "connection_health_monitor"
path = "examples/connection_health_monitor.rs"

[[example]]
name = "core_integration"
path = "examples/core_integration.rs"

[[example]]
name = "observability_example"
path = "examples/observability_example.rs"

[[example]]
name = "plugin_usage"
path = "examples/plugin_usage.rs"

[[example]]
name = "resource_state_plugin"
path = "examples/resource_state_plugin.rs"

[[example]]
name = "simple_journal"
path = "examples/simple_journal.rs"

[[example]]
name = "transaction_example"
path = "examples/transaction_example.rs"

[[example]]
name = "rbac_independent_test"
path = "examples/rbac_independent_test.rs"

[[example]]
name = "monitoring_integration"
path = "examples/monitoring_integration.rs"

[[example]]
name = "monitoring_api_test"
path = "examples/monitoring_api_test.rs"

[[example]]
name = "resilience_monitoring_integration"
path = "examples/integration/resilience_monitoring_integration.rs"

[[example]]
name = "resilience_integration"
path = "examples/resilience_integration.rs"

[[example]]
name = "retry_example"
path = "examples/retry_example.rs"

# Define the new binary target
[[bin]]
name = "sync_server_stub"
path = "src/bin/sync_server_stub.rs"

[[bin]]
name = "sync_server"
path = "src/bin/sync_server.rs"

[[bin]]
name = "sync_test_cli"
path = "src/bin/sync_test_cli.rs"

[[bin]]
name = "task_server"
path = "src/bin/task_server.rs"

[[bin]]
name = "task_server_minimal"
path = "src/bin/task_server_minimal.rs"

[[example]]
name = "task_client_minimal"
path = "examples/task_client_minimal.rs"

[[bin]]
name = "watch_task_test"
path = "src/bin/watch_task_test.rs"
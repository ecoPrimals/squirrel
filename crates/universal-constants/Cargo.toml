[package]
name = "universal-constants"
version = "0.1.0"
edition = "2024"
authors = ["Squirrel Team"]
description = "Universal constants for the Squirrel MCP system - single source of truth"
license = "AGPL-3.0-only"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[dependencies]
tracing = "0.1"
arcstr = "1"  # Used by zero_copy module
nix = { version = "0.27", features = ["hostname"] }

[dev-dependencies]
temp-env = "0.3"

[lints]
workspace = true

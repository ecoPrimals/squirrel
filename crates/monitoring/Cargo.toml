[package]
name = "squirrel-monitoring"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Monitoring and metrics system for Squirrel"

[dependencies]
# Core dependencies
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }
futures-util = { version = "0.3", features = ["sink"] }
async-trait = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
prometheus = { workspace = true }
sysinfo = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
reqwest = { version = "0.11", features = ["json"] }
chrono = { workspace = true, features = ["serde"] }
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
opentelemetry-jaeger = { workspace = true }
rand = "0.8"
fastrand = "2.0"
clap = { version = "4.4", features = ["derive"] }
url = "2.3"
regex = "1.10"
once_cell = "1.19"
anyhow = "1.0" # Added for plugin migration
lazy_static = "1.4" # Added for API singleton pattern
# WebSocket implementation is now part of main dependencies since we need it for tests
tokio-tungstenite = { version = "0.20.1" }
tungstenite = { version = "0.20.1" }
# Add axum for HTTP server, which was previously in dashboard modules
axum = "0.6.20"
tower = "0.4"

# Plugin system dependency (optional)
squirrel-plugins = { path = "../plugins", optional = true }

# Shared squirrel dependencies
squirrel-core = { path = "../core" }
time.workspace = true
log = { version = "0.4.26", default-features = false }

[features]
default = ["analytics", "websocket"]
use_plugins = ["squirrel-plugins"]
analytics = []
# WebSocket implementation is now a separate feature
# Enable by default since it's required for monitoring-dashboard integration
websocket = []

[dev-dependencies]
tokio-test = { workspace = true }
mockall = { workspace = true }
proptest = { workspace = true }
tempfile = "3.8.0"
test-log = "0.2.12"

[lib]
name = "squirrel_monitoring"
path = "src/lib.rs"

[[example]]
name = "prometheus_component"
path = "examples/prometheus_component.rs"

[[example]]
name = "plugin_example"
path = "examples/plugin_example.rs" 

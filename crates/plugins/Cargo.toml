[package]
name = "squirrel-plugins"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Plugin system for Squirrel"

[dependencies]
# Core dependencies
tokio = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }

# Optional dependencies for different plugin types
squirrel-app = { path = "../app", optional = true }
# Remove squirrel-web dependency to break circular dependency
# squirrel-web = { path = "../web", optional = true }
squirrel-mcp = { path = "../mcp", optional = true }
squirrel-cli = { path = "../cli", optional = true }

[features]
default = ["core"]
core = []
# Update web feature to not depend on squirrel-web
web = []
mcp = ["squirrel-mcp"]
cli = ["squirrel-cli"]
all = ["core", "web", "mcp", "cli"]

[lints]
workspace = true 
[package]
name = "squirrel-plugins"
version = "0.1.0"
edition = "2021"
description = "Plugin system for Squirrel applications"
license = "MIT OR Apache-2.0"
authors = ["DataScienceBioLab"]

# Define features to separate core functionality from app dependencies
[features]
default = ["core"]
core = []
# All features disabled by default
web = []
mcp = ["dep:squirrel-mcp"]
# cli feature removed
all = ["core", "web", "mcp"]
# No app in the "all" feature to avoid circular dependency

[dependencies]
# Core dependencies
tokio = { version = "1.35", features = ["full"] }
futures = "0.3"
async-trait = "0.1"
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.6", features = ["v4", "serde"] }
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
lazy_static = "1.4"
regex = "1.10"

# Internal dependencies
squirrel-core = { path = "../core" }
# Add interfaces dependency to break circular dependencies
squirrel-interfaces = { path = "../interfaces" }

# Optional dependencies for different plugin types - all made optional
# REMOVED: squirrel-app dependency to break circular dependency
# squirrel-app = { path = "../app", optional = true }
# Remove squirrel-web dependency to break circular dependency
# squirrel-web = { path = "../web", optional = true }
squirrel-mcp = { path = "../mcp", optional = true }
# Remove CLI dependency to break circular dependency
# squirrel-cli = { path = "../cli", optional = true }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.12"
test-case = "3.3"

[lints]
workspace = true
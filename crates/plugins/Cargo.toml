[package]
name = "squirrel-plugins"
version = "0.1.0"
edition = "2021"
description = "Plugin system for Squirrel applications"
license = "MIT OR Apache-2.0"
authors = ["DataScienceBioLab"]

[dependencies]
# Core dependencies
tokio = { version = "1.35", features = ["full"] }
futures = "0.3"
async-trait = "0.1"
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.6", features = ["v4", "serde"] }
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }

# Optional dependencies for different plugin types
squirrel-app = { path = "../app", optional = true }
# Remove squirrel-web dependency to break circular dependency
# squirrel-web = { path = "../web", optional = true }
squirrel-mcp = { path = "../mcp", optional = true }
squirrel-cli = { path = "../cli", optional = true }

lazy_static = "1.4"
regex = "1.10"

[features]
default = ["core"]
core = []
# Update web feature to not depend on squirrel-web
web = []
mcp = ["squirrel-mcp"]
cli = ["squirrel-cli"]
all = ["core", "web", "mcp", "cli"]

[lints]
workspace = true

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.12"
test-case = "3.3" 
[package]
name = "squirrel-mcp"
version = "0.1.0"
edition = "2024"
authors = ["ecoPrimals Contributors"]
license = "AGPL-3.0-or-later"
description = "MCP server and protocol stack for the Squirrel AI primal"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[dependencies]
# Core async runtime
tokio.workspace = true
tokio-stream = { workspace = true, optional = true }
tokio-util.workspace = true
futures-util.workspace = true
async-trait.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true
serde_bytes.workspace = true
uuid.workspace = true

# Networking & Transport
tarpc-mcp = { workspace = true, optional = true }
tokio-serde = { workspace = true, optional = true }
bincode = { workspace = true, optional = true }
tokio-tungstenite = { workspace = true, optional = true }
tungstenite = { workspace = true, optional = true }

# Internal crates
squirrel-mcp-config.workspace = true
universal-constants.workspace = true

# WebSocket support (optional, behind websocket feature)
axum-mcp = { workspace = true, optional = true }
axum-extra-mcp = { workspace = true, optional = true }

# Concurrency
dashmap.workspace = true

# Observability
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tracing-appender.workspace = true
metrics = { workspace = true, optional = true }
metrics-exporter-prometheus = { workspace = true, optional = true }

# Time and dates
chrono.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Configuration
toml.workspace = true

# Storage and persistence (optional)
sled = { workspace = true, optional = true }
sqlx = { workspace = true, optional = true }
redis = { workspace = true, optional = true }

# Compression (optional)
zstd = { workspace = true, optional = true }
flate2 = { workspace = true, optional = true }
lz4 = { workspace = true, optional = true }

# Cryptography (optional, for TLS)
rustls = { workspace = true, optional = true }
rustls-pemfile = { workspace = true, optional = true }

# AI providers (optional) - openai-api-rs/anthropic-sdk REMOVED: pulled reqwest 0.11 (native-tls/openssl).
# Providers use reqwest directly via direct-http (rustls). See coordinator/providers.rs.
# CRYPTO MIGRATION (ecoPrimals: Pure Rust): reqwest 0.12 → rustls 0.23 (pluggable crypto).
# Upgrade path: reqwest 0.12 + rustls-tls-manual-roots-no-provider. See docs/CRYPTO_MIGRATION.md.
reqwest = { workspace = true, optional = true }

# Plugin system (optional)
libloading = { workspace = true, optional = true }
wasmtime = { workspace = true, optional = true }
wasmtime-wasi = { workspace = true, optional = true }

# Utilities
parking_lot.workspace = true
rand.workspace = true
blake3.workspace = true
ed25519-dalek.workspace = true
futures.workspace = true
bytes.workspace = true
clap.workspace = true
regex.workspace = true
base64.workspace = true

[dev-dependencies]
tokio-test = "0.4"
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3.0"
mockall = "0.11"
proptest.workspace = true
insta = "1.34"
temp-env = "0.3"

[features]
# Integration tests gated until API rewrite (websocket, MCPMessage) — tracked in CURRENT_STATUS.md
integration-tests = []
disabled_until_rewrite = []

# Production default: streaming only (Zero-HTTP, Pure Rust)
default = ["streaming"]

# Direct HTTP to AI vendors (DEV/TESTING)
direct-http = ["dep:reqwest"]

# TLS support
tls = ["dep:rustls", "dep:rustls-pemfile"]

enhanced = [
    "websocket",
    "tarpc",
    "streaming",
    "ai-providers",
    "plugins",
    "persistence",
    "metrics",
    "compression"
]
full = [
    "websocket",
    "tarpc",
    "streaming",
    "ai-providers",
    "plugins",
    "persistence",
    "metrics",
    "compression"
]
websocket = ["dep:tokio-tungstenite", "dep:tungstenite", "dep:axum-mcp", "dep:axum-extra-mcp"]
tarpc = ["dep:tarpc-mcp", "dep:tokio-serde", "dep:bincode"]
streaming = ["dep:tokio-stream"]
ai-providers = ["direct-http"]
plugins = ["dep:libloading", "dep:wasmtime", "dep:wasmtime-wasi"]
persistence = ["dep:sled", "dep:sqlx", "dep:redis"]
metrics = ["dep:metrics", "dep:metrics-exporter-prometheus"]
compression = ["dep:zstd", "dep:flate2", "dep:lz4"]
sync-placeholders = []

[lints]
workspace = true

[package]
name = "squirrel-mcp"
version = "0.1.0"
edition = "2024"
authors = ["ecoPrimals Contributors"]
license = "AGPL-3.0-or-later"
description = "MCP server and protocol stack for the Squirrel AI primal"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[dependencies]
# Core async runtime
tokio.workspace = true
tokio-stream = { workspace = true, optional = true }
tokio-util.workspace = true
futures-util.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true
serde_bytes.workspace = true
uuid.workspace = true


# Internal crates
squirrel-mcp-config.workspace = true
universal-constants.workspace = true

# Concurrency
dashmap.workspace = true

# Observability
tracing.workspace = true
metrics = { workspace = true, optional = true }

# Time and dates
chrono.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Configuration
toml.workspace = true

# Compression (optional)
zstd = { workspace = true, optional = true }
flate2 = { workspace = true, optional = true }
lz4_flex = { workspace = true, optional = true }

# Utilities
rand.workspace = true
blake3.workspace = true
ed25519-dalek = { workspace = true, optional = true }
futures.workspace = true
bytes.workspace = true
clap.workspace = true
regex.workspace = true
base64.workspace = true

[dev-dependencies]
tokio-test = "0.4"
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3.0"
mockall = "0.11"
proptest.workspace = true
insta = "1.34"
temp-env = "0.3"

[features]
# Integration tests gated until API rewrite for UDS transport — tracked in CURRENT_STATUS.md
integration-tests = []
## integration-tests / disabled_until_rewrite: gated until API rewrite for UDS transport

# Production default: streaming only (Zero-HTTP, Pure Rust)
default = ["streaming"]

# Local Ed25519/BLAKE3 crypto (BearDog domain — feature-gated per primalSpring audit).
# When disabled, crypto operations delegate to the security primal via capability discovery.
local-crypto = ["dep:ed25519-dalek"]

enhanced = [
    "tarpc",
    "streaming",
    "metrics",
    "compression",
    "local-crypto"
]
full = [
    "tarpc",
    "streaming",
    "metrics",
    "compression",
    "local-crypto"
]
tarpc = []
streaming = ["dep:tokio-stream"]
metrics = ["dep:metrics"]
compression = ["dep:zstd", "dep:flate2", "dep:lz4_flex"]
## tls/plugins/persistence/sync-placeholders/disabled_until_rewrite removed —
## zero cfg(feature) references; re-add when implementations exist.

[lints]
workspace = true

[package]
name = "squirrel-mcp"
version = "0.1.0"
edition = "2021"
authors = ["DataScienceBioLab"]
license = "MIT OR Apache-2.0"

# Make this crate standalone to avoid workspace conflicts
[workspace]

[dependencies]
# Core async runtime
tokio = { version = "1.0", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"], optional = true }
tokio-util = { version = "0.7", features = ["full"] }
futures-util = "0.3"
async-trait = "0.1"
pin-project = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_bytes = "0.11"
uuid = { version = "1.0", features = ["serde", "v4"] }

# Networking & Transport
tarpc = { version = "0.34", features = ["tokio1", "serde-transport"], optional = true }
tokio-tungstenite = { version = "0.20", optional = true }
tungstenite = { version = "0.20", optional = true }
hyper = { version = "0.14", features = ["full"] }
tower = { version = "0.4", features = ["full"] }
tower-http = { version = "0.4", features = ["full"] }

# CRITICAL FIX: Add missing config dependency
squirrel-mcp-config = { path = "../../config" }
universal-constants = { path = "../../universal-constants" }

# WebSocket support
axum = { version = "0.6", features = ["ws", "headers"], optional = true }
axum-extra = { version = "0.8", optional = true }

# Streaming and channels
flume = { version = "0.10", optional = true }
crossbeam-channel = "0.5"
dashmap = "5.0"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
metrics = { version = "0.21", optional = true }
metrics-exporter-prometheus = { version = "0.12", optional = true }

# Time and dates
chrono = { version = "0.4", features = ["serde"] }
time = { version = "0.3", features = ["serde"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"
eyre = "0.6"

# Configuration
config = "0.13"
toml = "0.7"

# Storage and persistence
sled = { version = "0.34", optional = true }
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "uuid", "chrono"], optional = true }
redis = { version = "0.23", features = ["tokio-comp", "connection-manager"], optional = true }

# Compression
zstd = { version = "0.12", optional = true }
flate2 = { version = "1.0", optional = true }
lz4 = { version = "1.24", optional = true }

# Cryptography
ring = "0.16"
rustls = "0.21"
rustls-pemfile = "1.0"

# AI providers
openai-api-rs = { version = "0.1", optional = true }
anthropic-sdk = { version = "0.1", optional = true }
reqwest = { version = "0.11", features = ["json", "stream"] }

# Plugin system
libloading = { version = "0.8", optional = true }
wasmtime = { version = "12.0", optional = true }
wasmtime-wasi = { version = "12.0", optional = true }

# Utilities
once_cell = "1.0"
parking_lot = "0.12"
rayon = "1.0"
num_cpus = "1.0"
rand = "0.8"
futures = "0.3"
log = "0.4"
bytes = "1.0"

# Utils dependencies
regex = "1.7"
url = "2.0"
base64 = "0.21"
hex = "0.4"
urlencoding = "2.1"

# Development dependencies
[dev-dependencies]
tokio-test = "0.4"
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3.0"
mockall = "0.11"
proptest = "1.0"
insta = "1.34"

# Note: Local dependencies temporarily removed due to circular dependency issues
# squirrel-interfaces = { path = "../interfaces" }



[features]
default = ["streaming", "websocket"]
enhanced = [
    "websocket",
    "tarpc", 
    "streaming",
    "ai-providers",
    "plugins",
    "persistence",
    "metrics",
    "compression"
]
full = [
    "websocket",
    "tarpc",
    "streaming",
    "ai-providers",
    "plugins",
    "persistence",
    "metrics",
    "compression"
]
websocket = ["dep:tokio-tungstenite", "dep:tungstenite", "dep:axum", "dep:axum-extra"]
tarpc = ["dep:tarpc"]
streaming = ["dep:tokio-stream", "dep:flume"]
ai-providers = ["dep:openai-api-rs", "dep:anthropic-sdk"]
plugins = ["dep:libloading", "dep:wasmtime", "dep:wasmtime-wasi"]
persistence = ["dep:sled", "dep:sqlx", "dep:redis"]
metrics = ["dep:metrics", "dep:metrics-exporter-prometheus"]
compression = ["dep:zstd", "dep:flate2", "dep:lz4"]

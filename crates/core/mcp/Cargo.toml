[package]
name = "squirrel-mcp"
version = "0.1.0"
edition = "2024"
authors = ["ecoPrimals Contributors"]
license = "AGPL-3.0-only"

[dependencies]
# Core async runtime
tokio = { version = "1.0", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"], optional = true }
tokio-util = { version = "0.7", features = ["full"] }
futures-util = "0.3"
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_bytes = "0.11"
uuid = { version = "1.0", features = ["serde", "v4"] }

# Networking & Transport
tarpc = { version = "0.37", features = ["tokio1", "serde-transport"], optional = true }
tokio-serde = { version = "0.8", features = ["bincode"], optional = true }
bincode = { version = "1.3", optional = true }
tokio-tungstenite = { version = "0.20", optional = true }
tungstenite = { version = "0.20", optional = true }

# Internal crates
squirrel-mcp-config = { path = "../../config" }
universal-constants = { path = "../../universal-constants" }

# WebSocket support (optional, behind websocket feature)
axum = { version = "0.6", features = ["ws", "headers"], optional = true }
axum-extra = { version = "0.8", optional = true }

# Concurrency
dashmap = "5.0"

# Observability
tracing = { version = "0.1", features = ["log"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
metrics = { version = "0.21", optional = true }
metrics-exporter-prometheus = { version = "0.12", optional = true }

# Time and dates
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Configuration
toml = "0.8"

# Storage and persistence (optional)
sled = { version = "0.34", optional = true }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite", "uuid", "chrono"], optional = true }
redis = { version = "0.23", features = ["tokio-comp", "connection-manager"], optional = true }

# Compression (optional)
zstd = { version = "0.12", optional = true }
flate2 = { version = "1.0", optional = true }
lz4 = { version = "1.24", optional = true }

# Cryptography (optional, for TLS)
rustls = { version = "0.21", optional = true }
rustls-pemfile = { version = "1.0", optional = true }

# AI providers (optional) - openai-api-rs/anthropic-sdk REMOVED: pulled reqwest 0.11 (native-tls/openssl).
# Providers use reqwest directly via direct-http (rustls). See coordinator/providers.rs.
# CRYPTO MIGRATION (ecoPrimals: Pure Rust): reqwest 0.12 → rustls 0.23 (pluggable crypto).
# Upgrade path: reqwest 0.12 + rustls-tls-manual-roots-no-provider. See docs/CRYPTO_MIGRATION.md.
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"], optional = true }

# Plugin system (optional)
libloading = { version = "0.8", optional = true }
wasmtime = { version = "12.0", optional = true }
wasmtime-wasi = { version = "12.0", optional = true }

# Utilities
parking_lot = "0.12"
rand = "0.8"
futures = "0.3"
bytes = "1.0"
clap = "4.0"
regex = "1.7"
base64 = "0.21"

[dev-dependencies]
tokio-test = "0.4"
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3.0"
mockall = "0.11"
proptest = "1.0"
insta = "1.34"
temp-env = "0.3"

[features]
# Integration tests gated until API rewrite (websocket, MCPMessage) — tracked in CURRENT_STATUS.md
integration-tests = []
disabled_until_rewrite = []

# Production default: streaming only (Zero-HTTP, Pure Rust)
default = ["streaming"]

# Direct HTTP to AI vendors (DEV/TESTING)
direct-http = ["dep:reqwest"]

# TLS support
tls = ["dep:rustls", "dep:rustls-pemfile"]

enhanced = [
    "websocket",
    "tarpc",
    "streaming",
    "ai-providers",
    "plugins",
    "persistence",
    "metrics",
    "compression"
]
full = [
    "websocket",
    "tarpc",
    "streaming",
    "ai-providers",
    "plugins",
    "persistence",
    "metrics",
    "compression"
]
websocket = ["dep:tokio-tungstenite", "dep:tungstenite", "dep:axum", "dep:axum-extra"]
tarpc = ["dep:tarpc", "dep:tokio-serde", "dep:bincode"]
streaming = ["dep:tokio-stream"]
ai-providers = ["direct-http"]
plugins = ["dep:libloading", "dep:wasmtime", "dep:wasmtime-wasi"]
persistence = ["dep:sled", "dep:sqlx", "dep:redis"]
metrics = ["dep:metrics", "dep:metrics-exporter-prometheus"]
compression = ["dep:zstd", "dep:flate2", "dep:lz4"]
sync-placeholders = []

[lints]
workspace = true

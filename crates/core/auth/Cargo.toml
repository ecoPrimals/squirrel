[package]
name = "squirrel-mcp-auth"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Authentication and JWT handling for Squirrel MCP"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[features]
default = ["delegated-jwt"]  # Production: delegate to BearDog (TRUE ecoBin!)
delegated-jwt = []           # Use BearDog for JWT validation (Pure Rust!)
local-jwt = ["dep:jsonwebtoken"]  # Dev/testing: local JWT (brings ring)
http-auth = ["dep:reqwest"]  # HTTP-based auth (brings reqwest → ring)
# Integration tests disabled - API has changed, tests need rewrite
integration-tests = []

[dependencies]
# beardog = { path = "../../../../../beardog", version = "0.1.0" }  # Will be added in proper integration
squirrel-mcp-config = { path = "../../config", version = "0.1.0" }
universal-constants = { path = "../../universal-constants", version = "0.1.0" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# JWT: Feature-gated for TRUE ecoBin
# - Production (delegated-jwt): Uses BearDog via Unix socket (Pure Rust!)
# - Dev/testing (local-jwt): Local JWT validation (brings ring C dep)
jsonwebtoken = { version = "9.3", optional = true }

base64 = "0.22"
rand.workspace = true
zeroize = { version = "1.7", features = ["zeroize_derive"] }
# HTTP client (OPTIONAL - for HTTP-based auth)
# Production uses Unix sockets!
#
# CRYPTO MIGRATION (ecoPrimals: Pure Rust): reqwest 0.12 → rustls 0.23 (pluggable crypto).
# Upgrade path: reqwest 0.12 + rustls-tls-manual-roots-no-provider + custom crypto provider.
# See docs/CRYPTO_MIGRATION.md.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }

[dev-dependencies]
tokio-test = "0.4"
temp-env = "0.3"
tempfile = "3.8"
[lints]
workspace = true

[package]
name = "squirrel-mcp-auth"
version = "0.1.0"
edition = "2021"

[dependencies]
# beardog = { path = "../../../../../beardog" }  # Will be added in proper integration
squirrel-mcp-config = { path = "../../config" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
uuid = { version = "1.0", features = ["v4", "serde"] }
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
jsonwebtoken = "9.3"
base64 = "0.22"
rand = "0.8"
reqwest = { version = "0.11", features = ["json"] }

[dev-dependencies]
tokio-test = "0.4" 
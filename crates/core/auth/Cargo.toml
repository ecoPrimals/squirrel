[package]
name = "squirrel-mcp-auth"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Authentication and JWT handling for Squirrel MCP"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[features]
default = ["delegated-jwt"]  # Production: delegate to BearDog (TRUE ecoBin!)
delegated-jwt = []           # Use BearDog for JWT validation (Pure Rust!)
## local-jwt and http-auth removed (stadial gate: ring/reqwest lockfile ghosts eliminated)
# Integration tests disabled - API has changed, tests need rewrite
integration-tests = []

[dependencies]
# beardog = { path = "../../../../../beardog", version = "0.1.0" }  # Will be added in proper integration
squirrel-mcp-config = { path = "../../config", version = "0.1.0" }
universal-constants = { path = "../../universal-constants", version = "0.1.0" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

base64 = "0.22"
rand.workspace = true
zeroize = { version = "1.7", features = ["zeroize_derive"] }
[dev-dependencies]
tokio-test = "0.4"
temp-env = "0.3"
tempfile = "3.8"
[lints]
workspace = true

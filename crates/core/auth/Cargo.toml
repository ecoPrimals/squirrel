[package]
name = "squirrel-mcp-auth"
version = "0.1.0"
edition = "2021"

[features]
default = ["delegated-jwt"]  # Production: delegate to BearDog (TRUE ecoBin!)
delegated-jwt = []           # Use BearDog for JWT validation (Pure Rust!)
local-jwt = ["dep:jsonwebtoken"]  # Dev/testing: local JWT (brings ring)
http-auth = ["dep:reqwest"]  # HTTP-based auth (brings reqwest → ring)

[dependencies]
# beardog = { path = "../../../../../beardog" }  # Will be added in proper integration
squirrel-mcp-config = { path = "../../config" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
uuid = { version = "1.0", features = ["v4", "serde"] }
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }

# JWT: Feature-gated for TRUE ecoBin
# - Production (delegated-jwt): Uses BearDog via Unix socket (Pure Rust!)
# - Dev/testing (local-jwt): Local JWT validation (brings ring C dep)
jsonwebtoken = { version = "9.3", optional = true }

base64 = "0.22"
rand = "0.8"
zeroize = { version = "1.7", features = ["zeroize_derive"] }
# HTTP client (OPTIONAL - for HTTP-based auth)
# Production uses Unix sockets!
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"], optional = true }

[dev-dependencies]
tokio-test = "0.4" 
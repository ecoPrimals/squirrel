[package]
name = "squirrel-core"
version = "0.1.0"
edition = "2024"
authors = ["ecoPrimals Contributors"]
license = "AGPL-3.0-or-later"
description = "Core squirrel functionality"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[dependencies]
# Core async and serialization
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
anyhow = "1.0"
futures = "0.3"

# HTTP and networking (OPTIONAL - for HTTP utilities)
# Production uses Unix sockets!
#
# CRYPTO MIGRATION (ecoPrimals: Pure Rust): reqwest 0.12 → rustls 0.23 (pluggable crypto).
# Upgrade path: reqwest 0.12 + rustls-tls-manual-roots-no-provider + custom crypto provider.
# See docs/CRYPTO_MIGRATION.md.
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"], optional = true }
url = "2.5"

# Web framework (OPTIONAL - legacy HTTP API, production uses Unix sockets)
axum = { version = "0.7", features = ["ws", "json", "tokio"], optional = true }
tower = { version = "0.4", optional = true }
tower-http = { version = "0.5", features = ["cors", "trace"], optional = true }

# Concurrency and synchronization (CRITICAL FIX: Missing dependencies)
dashmap = "5.5"
parking_lot = "0.12"

# Random number generation (CRITICAL FIX: Missing rand dependency) 
rand = "0.8"

# Logging and tracing
tracing = { version = "0.1", features = ["log"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Ecosystem dependencies
ecosystem-api = { path = "../../ecosystem-api", version = "0.1.0" }
squirrel-interfaces = { path = "../interfaces", version = "0.1.0" }
universal-constants = { path = "../../universal-constants", version = "0.1.0" }
universal-patterns = { path = "../../universal-patterns", version = "0.1.0" }

# CRITICAL FIX: Add missing config dependency
squirrel-mcp-config = { path = "../../config", version = "0.1.0" }

[[bin]]
name = "squirrel-mcp-server"
path = "src/bin/squirrel-mcp-server.rs"
required-features = ["http-api"]

[features]
default = []
# Songbird service mesh functionality (coordination, federation, swarm, etc.)
mesh = []
# Legacy HTTP API server (brings axum, tower, hyper stack; requires mesh for routing/federation)
http-api = ["dep:axum", "dep:tower", "dep:tower-http", "mesh"]
# HTTP client utilities (brings reqwest)
http-client = ["dep:reqwest"]


[dev-dependencies]
# Renamed so `use tower::...` is not ambiguous with `tower` 0.4 (via `tower-http`).
tower05 = { package = "tower", version = "0.5", default-features = false, features = ["util"] }

[lints]
workspace = true

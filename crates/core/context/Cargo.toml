[package]
name = "squirrel-context"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "AGPL-3.0-or-later"
description = "Context management for the Squirrel AI system"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[lints]
workspace = true

[dependencies]
# Core dependencies
tokio.workspace = true
futures.workspace = true
thiserror.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml_ng.workspace = true
uuid.workspace = true
chrono.workspace = true
rand.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
glob = "0.3"
regex.workspace = true
async-recursion.workspace = true
dashmap.workspace = true
# Shared squirrel dependencies
squirrel-interfaces.workspace = true
universal-constants = { path = "../../universal-constants", version = "0.1.0" }

[dev-dependencies]
tokio-test.workspace = true
pretty_assertions.workspace = true
tempfile.workspace = true
mockall.workspace = true

[features]
default = []
with-plugins = []

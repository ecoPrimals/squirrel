[package]
name = "squirrel-plugins"
version = "0.1.0"
edition = "2024"
authors = ["ecoPrimals Contributors"]
license = "AGPL-3.0-only"
description = "Plugin system for squirrel"

[dependencies]
# Core dependencies
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"
anyhow = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# HTTP and networking
# Production uses capability_http (delegates to Songbird via Unix sockets)
# reqwest is optional, only for marketplace feature
#
# CRYPTO MIGRATION (ecoPrimals: Pure Rust): reqwest 0.12 → rustls 0.23 (pluggable crypto).
# Upgrade path: reqwest 0.12 + rustls-tls-manual-roots-no-provider + rustls::crypto::aws_lc_rs
# or rustls-rustcrypto (alpha, 100% Rust). See docs/CRYPTO_MIGRATION.md.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }
url = "2.5"

# Logging and tracing
tracing = { version = "0.1", features = ["log"] }

# Version management and synchronization (CRITICAL FIX: Missing dependencies)
semver = "1.0"
# once_cell removed - evolved to std::sync::OnceLock/LazyLock (stable Rust 1.80+)
dashmap = "5.0"

# CRITICAL FIX: Add missing config dependency
squirrel-mcp-config = { path = "../../config", version = "0.1.0" }

# Add interfaces dependency for canonical types
squirrel-interfaces = { path = "../interfaces", version = "0.1.0" }
universal-constants = { path = "../../universal-constants", version = "0.1.0" }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11"
test-case = "3.0"
tempfile = "3.0"

[features]
default = ["core"]
core = []
testing = []
web = []
mcp-interfaces = []
mcp = ["mcp-interfaces"]
cli = []
marketplace = ["dep:reqwest"]
repository-server = ["marketplace"]
standard = ["core", "web", "mcp-interfaces", "marketplace", "repository-server"] 

[lints]
workspace = true

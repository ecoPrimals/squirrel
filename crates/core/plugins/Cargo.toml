[package]
name = "squirrel-plugins"
version = "0.1.0"
edition = "2021"
authors = ["DataScienceBioLab"]
license = "MIT OR Apache-2.0"
description = "Plugin system for squirrel"

# Make this crate standalone to avoid workspace conflicts
[workspace]

[lints.clippy]
# Modern async Rust uses async fn in traits (stable since Rust 1.75)
async_fn_in_trait = "allow"

[dependencies]
# Core dependencies
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"
anyhow = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# HTTP and networking
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }
url = "2.5"

# Logging and tracing
tracing = "0.1"
log = "0.4"

# Version management and synchronization (CRITICAL FIX: Missing dependencies)
semver = "1.0"
once_cell = "1.0"

# CRITICAL FIX: Add missing config dependency
squirrel-mcp-config = { path = "../../config" }

# Add interfaces dependency for canonical types
squirrel-interfaces = { path = "../interfaces" }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11"
test-case = "3.0"

[features]
default = ["core"]
core = []
web = []
mcp-interfaces = []
mcp = ["mcp-interfaces"]
cli = []
marketplace = []
repository-server = ["marketplace"]
standard = ["core", "web", "mcp-interfaces", "marketplace", "repository-server"] 

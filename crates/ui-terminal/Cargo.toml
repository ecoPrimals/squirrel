[package]
name = "ui-terminal"
version = "0.1.0"
edition = "2021"

[dependencies]
ratatui = { version = "0.27.0", features = ["crossterm"] }
crossterm = "0.27.0"
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
thiserror = "1.0"
anyhow = "1.0"

# Workspace dependency
dashboard-core = { path = "../dashboard-core" }

# Optional dependency for MCP client (if needed directly)
# squirrel_mcp = { path = "../../squirrel-mcp" } # Assuming path structure

[dev-dependencies]
# Add development dependencies if needed (e.g., for tests) 
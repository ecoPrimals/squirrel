[package]
name = "ui-terminal"
version = "0.1.0"
edition = "2021"

# Add binary targets
[[bin]]
name = "squirrel-dashboard"
path = "src/bin/dashboard.rs"

[[bin]]
name = "aichat"
path = "src/bin/aichat.rs"

[dependencies]
# Workspace dependencies
dashboard-core = { path = "../dashboard-core" }
squirrel-mcp = { path = "../mcp" }
squirrel-integration = { path = "../integration" }
squirrel-ai-tools = { path = "../ai-tools" }

# UI dependencies
ratatui = { version = "0.26.1", features = ["all-widgets"] }
crossterm = "0.27.0"
tokio = { version = "1.36.0", features = ["full"] }
tokio-util = "0.7.10"
rand = "0.8.5"
textwrap = "0.16"

# Language server dependencies
tower-lsp = "0.20.0"
ropey = "1.6.1"

# Utility dependencies
thiserror = "1.0"
anyhow = "1.0"
async-openai = "0.17.0"
secrecy = "0.8.0"
directories = "5.0.1"
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
env_logger = "0.10.1"

# Workspace dependency
# dashboard-core = { path = "../dashboard-core" }

# Optional dependency for MCP client (if needed directly)
# squirrel_mcp = { path = "../../squirrel-mcp" } # Assuming path structure

# Added dependencies for message history
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dirs = "5.0"

[dev-dependencies]
# Add development dependencies if needed (e.g., for tests)
anyhow = "1.0"
tokio = { version = "1", features = ["full"] }
mockall = "0.12.1"
async-trait = "0.1.73"

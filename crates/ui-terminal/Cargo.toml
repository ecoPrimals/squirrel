[package]
name = "ui-terminal"
version = "0.1.0"
edition = "2021"
description = "Terminal UI implementation for the Squirrel monitoring dashboard"

[dependencies]
# Dashboard core
dashboard-core = { path = "../dashboard-core" }

# TUI dependencies
ratatui = "0.24.0"
crossterm = "0.27.0"

# Async runtime
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Command-line arguments
clap = { version = "4.5", features = ["derive"] }

# System monitoring
sysinfo = "0.29.10"

# Utilities
tui-input = "0.8.0"

# Random number generation
rand = "0.8.5"

# Configuration
config = "0.13"
toml = "0.8"
directories = "5.0"
thiserror = "1.0"

# Logging and error handling
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11" 
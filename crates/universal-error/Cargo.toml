[package]
name = "universal-error"
version = "0.1.0"
edition = "2024"
authors = ["Squirrel Team"]
description = "Universal error system for Squirrel - extends the excellent MCP error architecture"
license = "AGPL-3.0-or-later"
repository = "https://github.com/ecoPrimals/squirrel"
readme = "README.md"
keywords = ["ecoprimals", "ai", "mcp", "json-rpc"]
categories = ["development-tools"]

[dependencies]
# For error definitions
thiserror = "1.0"

# For serialization
serde_json = "1.0"

# Re-export the excellent MCP error system
squirrel-mcp = { path = "../core/mcp", version = "0.1.0" }

[dev-dependencies]
# For testing

[features]
default = []

[lints]
workspace = true

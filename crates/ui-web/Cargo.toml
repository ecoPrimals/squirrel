[package]
name = "squirrel-ui-web"
version = "0.1.0"
edition = "2021"
authors.workspace = true
description = "Web UI components for the Squirrel system"

[dependencies]
# Web-specific dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
anyhow = "1.0"
thiserror = "1.0"
async-trait = "0.1"
uuid = { version = "1.0", features = ["serde", "v4"] }
chrono = { version = "0.4", features = ["serde"] }
regex = "1.8"
http = "0.2"
# For wasm support
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
web-sys = { version = "0.3", features = [
    "Document", "Element", "HtmlElement", "Node", "Window",
    "HtmlInputElement", "HtmlButtonElement", "Event", "EventTarget",
    "Storage", "DomTokenList", "console"
], optional = true }

# Squirrel dependencies
squirrel-core = { path = "../core" }
squirrel-web = { path = "../web" }

[features]
default = ["mock-api"]
wasm = ["wasm-bindgen", "js-sys", "web-sys"]
mock-api = []

[dev-dependencies]
tokio-test = "0.4"
pretty_assertions = "1.3"
wasm-bindgen-test = "0.3"

[build-dependencies]
glob = "0.3" 
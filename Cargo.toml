[package]
name = "squirrel"
version = "0.1.0"
edition = "2021"
authors = ["DataScienceBioLab"]
license = "MIT OR Apache-2.0"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
async-trait = "0.1"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.11", features = ["json"] }
base64 = "0.21"
num_cpus = "1.0"
config = { path = "config", package = "squirrel-mcp-config" }

# Temporarily disabled due to API changes
# [[bench]]
# name = "squirrel_performance"
# harness = false

# Temporarily disabled due to API changes
# [[bench]]
# name = "songbird_orchestration"
# harness = false

# [[bench]]
# name = "beardog_security"
# harness = false

# Temporarily disabled due to API changes
# [[bench]]
# name = "universal_patterns"
# harness = false

# [[bench]]
# name = "mcp_protocol"
# harness = false

[workspace]
resolver = "2"
members = [
    # Core libraries (only existing ones)
    "code/crates/core/interfaces",
    "code/crates/core/context", 
    "code/crates/core/plugins",
    "code/crates/core/mcp",
    "code/crates/core/core",
    
    # Universal patterns
    "code/crates/universal-patterns",
    
    # Services (keeping only commands)
    "code/crates/services/commands",
    
    # Tools
    "code/crates/tools/ai-tools",
    
    # Integration packages (only existing ones)
    "code/crates/integration/context-adapter",
    "code/crates/integration/toadstool", 
    "code/crates/integration/api-clients",
    "code/crates/integration/ecosystem",
]

[workspace.package]
authors = ["DataScienceBioLab"]
edition = "2021"
license = "MIT OR Apache-2.0"
version = "0.1.0"

[workspace.dependencies]
# Core dependencies
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
tracing = "0.1"
tracing-subscriber = "0.3"
log = "0.4"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"
sled = "0.34"
regex = "1.10"
serde_yaml = "0.9"
parking_lot = "0.12"
async-recursion = "1.0"
bytes = "1.5"
lazy_static = "1.4"
glob = "0.3"
ring = "0.17"
url = "2.4"
sha256 = "1.4"
urlencoding = "2.1"
test-case = "3.3"
clap = { version = "4.4", features = ["derive"] }
sysinfo = "0.29"
secrecy = "0.8"
flate2 = { version = "1.0", features = ["zlib"] }
zstd = { version = "0.13", features = ["zstdmt"] }
lz4 = "1.24"
base64 = "0.21"
socket2 = "0.5"
tokio-tungstenite = "0.20"
bincode = "1.3"
blake3 = "1.5"
libloading = "0.8"
jsonwebtoken = "8.3"
once_cell = "1.19"
async-std = "1.12"
futures-util = "0.3"
tokio-util = { version = "0.7", features = ["codec"] }
opentelemetry = { version = "0.20", features = ["metrics"] }
opentelemetry_sdk = { version = "0.20", features = ["metrics", "rt-tokio"] }
semver = "1.0"
lru = "0.12"
sha2 = "0.10"
hex = "0.4"
metrics = "0.21"
zeroize = "1.7"
governor = "0.6"
tokio-stream = "0.1"
directories = "5.0"
toml = "0.8"
dashmap = "5.4"
dirs = "5.0"
mockito = "1.2"
wiremock = "0.5"
tracing-test = "0.2"
walkdir = "2.4"
test-context = "0.2"
prometheus = "0.13"
proptest = "1.4"
time = "0.3.20"
hyper = "1.1"
http = "1.0"
tungstenite = "0.20"
fastrand = "1.8"
test-log = "0.2.12"
env_logger = "0.10"
criterion = "0.5"
fern = "0.6"
yaml-rust = "0.4"
colored = "2.0"
prettytable-rs = "0.10"
portpicker = "0.1.1"
assert_cmd = "2.0"
predicates = "3.0"
sqlx = { version = "0.7", features = ["runtime-tokio-native-tls", "sqlite"] }
notify = "5.0"
textwrap = "0.16"
tower-lsp = "0.20.0"
ropey = "1.6.1"
async-openai = "0.17.0"

# Web/HTTP
axum = { version = "0.7", features = ["ws", "multipart"] }
reqwest = { version = "0.11", features = ["json"] }
tower = { version = "0.4" }
tower-http = { version = "0.4", features = ["cors", "trace", "fs"] }

# gRPC and Protocol Buffers
tonic = { version = "0.12", features = ["transport"] }
prost = "0.13"
prost-types = "0.13"
prost-build = "0.13"

# AI/ML
openai = "1.0"
anthropic = "0.0.8"
google-generative-ai = "0.1"

# Testing dependencies
tokio-test = "0.4"
mockall = "0.11"
pretty_assertions = "1.4"
tempfile = "3.8"

# Crate dependencies (keeping only core MCP functionality)
squirrel-interfaces = { path = "code/crates/core/interfaces" }
squirrel-context = { path = "code/crates/core/context" }
squirrel-plugins = { path = "code/crates/core/plugins" }
squirrel-mcp = { path = "code/crates/core/mcp" }
squirrel-core = { path = "code/crates/core/core" }
squirrel-api-clients = { path = "code/crates/integration/api-clients" }
squirrel-context-adapter = { path = "code/crates/integration/context-adapter" }
squirrel-commands = { path = "code/crates/services/commands" }
universal-patterns = { path = "code/crates/universal-patterns" }

[workspace.lints.rust]
missing_docs = "warn"
unused_imports = "warn"
unused_variables = "warn"

[profile.dev]
debug = true
opt-level = 0

[profile.release]
debug = false
opt-level = 3
lto = true
codegen-units = 1 

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11"
pretty_assertions = "1.4"
tempfile = "3.8"
url = "2.4"
criterion = "0.5"
test-context = "0.2"
wiremock = "0.5"
tracing-test = "0.2" 
universal-patterns = { path = "code/crates/universal-patterns" } 

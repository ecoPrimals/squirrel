[workspace]
resolver = "2"
members = [
    # Main application
    "crates/main",
    
    # Core components
    "crates/core/interfaces",
    "crates/core/core",
    "crates/core/context",
    "crates/core/plugins",
    "crates/core/mcp",
    
    # Integration components
    "crates/integration/api-clients",
    "crates/integration/context-adapter",
    "crates/integration/ecosystem",
    "crates/integration/toadstool",
    
    # Service components
    "crates/services/commands",
    
    # Tool components
    "crates/tools/ai-tools",
    "crates/tools/cli",
    "crates/tools/rule-system",
    
    # SDK components
    "crates/sdk",
]

[workspace.package]
authors = ["DataScienceBioLab"]
edition = "2021"
license = "MIT OR Apache-2.0"
version = "0.1.0"

[workspace.dependencies]
# Core dependencies
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
tracing = "0.1"
tracing-subscriber = "0.3"
log = "0.4"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"
sled = "0.34"
regex = "1.10"
serde_yaml = "0.9"
parking_lot = "0.12"
async-recursion = "1.0"
bytes = "1.5"
lazy_static = "1.4"
glob = "0.3"
ring = "0.17"
url = "2.4"
sha256 = "1.4"
urlencoding = "2.1"
test-case = "3.3"
clap = { version = "4.4", features = ["derive"] }
sysinfo = "0.29"
secrecy = { version = "0.8", features = ["serde"] }
flate2 = { version = "1.0", features = ["zlib"] }
zstd = { version = "0.13", features = ["zstdmt"] }
lz4 = "1.24"
base64 = "0.21"
socket2 = "0.5"
tokio-tungstenite = "0.20"
bincode = "1.3"
blake3 = "1.5"
libloading = "0.8"
jsonwebtoken = "9.2"
once_cell = "1.19"
async-std = "1.12"
futures-util = "0.3"
tokio-util = { version = "0.7", features = ["codec"] }
opentelemetry = { version = "0.20", features = ["metrics"] }
opentelemetry_sdk = { version = "0.20", features = ["metrics", "rt-tokio"] }
semver = "1.0"
lru = "0.12"
sha2 = "0.10"
hex = "0.4"
metrics = "0.21"
zeroize = "1.7"
governor = "0.6"
tokio-stream = "0.1"
directories = "5.0"
toml = "0.8"
dashmap = "5.4"
dirs = "5.0"
mockito = "1.2"
wiremock = "0.5"
tracing-test = "0.2"
walkdir = "2.4"
test-context = "0.2"
prometheus = "0.13"
proptest = "1.4"
time = "0.3.20"
hyper = "1.1"
http = "1.0"
tungstenite = "0.20"
fastrand = "1.8"
test-log = "0.2.12"
env_logger = "0.10"
criterion = "0.5"
fern = "0.6"
yaml-rust = "0.4"
colored = "2.0"
prettytable-rs = "0.10"
portpicker = "0.1.1"
assert_cmd = "2.0"
predicates = "3.0"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "sqlite", "json", "chrono", "uuid"] }
notify = "5.0"
textwrap = "0.16"
tower-lsp = "0.20.0"
ropey = "1.6.1"
async-openai = "0.17.0"
tonic = { version = "0.12", features = ["transport"] }
prost = "0.13"
prost-types = "0.13"
prost-build = "0.13"

# Web/HTTP
axum = { version = "0.6", features = ["ws", "multipart"] }
reqwest = { version = "0.11", features = ["json"] }
tower = { version = "0.4" }
tower-http = { version = "0.4", features = ["cors", "trace", "fs"] }

# AI/ML
openai = "1.0"
anthropic = "0.0.8"

# Testing dependencies
tokio-test = "0.4"
mockall = "0.11"
pretty_assertions = "1.4"
tempfile = "3.8"

# Crate dependencies
squirrel-interfaces = { path = "crates/core/interfaces" }
squirrel-context = { path = "crates/core/context" }
squirrel-plugins = { path = "crates/core/plugins" }
squirrel-mcp = { path = "crates/core/mcp" }
squirrel-core = { path = "crates/core/core" }
squirrel-api-clients = { path = "crates/integration/api-clients" }
squirrel-context-adapter = { path = "crates/integration/context-adapter" }
mcp-pyo3-bindings = { path = "crates/integration/mcp-pyo3-bindings" }
squirrel-integration = { path = "crates/integration" }
squirrel-toadstool = { path = "crates/integration/toadstool" }
squirrel-commands = { path = "crates/services/commands" }
squirrel-ai-tools = { path = "crates/tools/ai-tools" }
squirrel-cli = { path = "crates/tools/cli" }
squirrel-rule-system = { path = "crates/tools/rule-system" }
squirrel-sdk = { path = "crates/sdk" }

[workspace.lints.rust]
missing_docs = "warn"
unused_imports = "warn"
unused_variables = "warn"

[profile.dev]
debug = true
opt-level = 0

[profile.release]
debug = false
opt-level = 3
lto = true
codegen-units = 1
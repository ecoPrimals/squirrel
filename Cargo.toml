[workspace]
resolver = "2"
members = [
    "crates/interfaces",
    "crates/plugins",
    "crates/mcp",
    "crates/core",
    "test_plugin_fix",
    "crates/rule-system",
    "crates/ui-web",
    "crates/dashboard-core",
    "crates/ui-terminal",
    "crates/ui-tauri-react",
    "adapter-pattern-tests", 
    "adapter-pattern-examples",
    "crates/commands",
    "test_crate",
    "fuzz",
    "crates/integration",
    "crates/thread-safety-tests",
    "crates/mcp-pyo3-bindings",
    "crates/cli",
    "crates/app",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["DataScienceBioLab"]
license = "MIT OR Apache-2.0"
description = "A modular and extensible Rust application framework"

[workspace.dependencies]
# Async runtime and utilities
tokio = { version = "1.35", features = ["full"] }
futures = "0.3.30"
async-trait = "0.1.74"
futures-util = "0.3.28"
tokio-util = { version = "0.7.9", features = ["codec"] }
tokio-test = "0.4.3"

# Error handling
thiserror = "1.0.50"
anyhow = "1.0.79"

# Serialization
serde = { version = "1.0.193", features = ["derive"] }
serde_json = "1.0.108"
uuid = { version = "1.6.1", features = ["v4", "serde"] }
chrono = { version = "0.4.31", features = ["serde"] }

# Logging and telemetry
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
opentelemetry = "0.21.0"
opentelemetry_sdk = "0.21.2"
opentelemetry-jaeger = "0.20.0"
prometheus = "0.13"

# Web and HTTP
axum = { version = "0.7.1", features = ["ws", "multipart"] }
reqwest = { version = "0.11.23", features = ["json"] }
tower = { version = "0.4.13" }
tower-http = { version = "0.4.4", features = ["cors", "trace", "fs", "limit"] }

# Storage
sled = "0.34.7"

# Cryptography
ring = "0.17.7"

# TUI
ratatui = { version = "0.26.3", features = ["all-widgets"] }
crossterm = "0.27.0"

# Utils
bytes = "1.5.0"
lazy_static = "1.4.0"
regex = "1.10.2"
rand = "0.8.5"
log = "0.4.20"
url = "2.4.1"
sha256 = "1.4.0"
sha2 = "0.10.8"
hex = "0.4.3"
semver = "1.0.20"
lru = "0.12.1"
urlencoding = "2.1.3"
tempfile = "3.8.1"
sysinfo = "0.29.11"
time = "0.3.20"

# Testing
mockall = "0.12.1"
criterion = "0.5.1"
insta = "1.34.0"
snapbox = "0.4.14"
proptest = "1.4.0"
test-case = "3.3.1"

# Fuzzing
libfuzzer-sys = "0.4"
arbitrary = "1.3"

[workspace.lints.rust]


[workspace.lints.clippy]
# General categories


[package]
name = "squirrel"
version = "0.1.0"
edition = "2021"
authors.workspace = true
description = "A modular and maintainable Rust project"

[dependencies]
# Core dependencies
tokio = { version = "1.0", features = ["full"], optional = true }
futures = "0.3"
async-trait = "0.1"
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
uuid = { version = "1.6", features = ["v4", "serde"] }
libloading = "0.8"

# Required for the simple_journal example
clap = { version = "4.4", features = ["derive"], optional = true }
squirrel-commands = { path = "crates/commands" }

# Squirrel crates
squirrel-core = { path = "crates/core" }
squirrel-interfaces = { path = "crates/interfaces" }
squirrel-context = { path = "crates/context" }
squirrel-mcp = { path = "crates/mcp" }
squirrel-plugins = { path = "crates/plugins", features = ["marketplace"] }
squirrel-integration = { path = "crates/integration" }
squirrel-ai-tools = { path = "crates/ai-tools" }
secrecy = "0.8"

# Monitoring and logging
metrics = "0.21"
metrics-exporter-prometheus = "0.12"
prometheus = "0.13"

# MCP dependencies
bytes = "1.5"
futures-util = "0.3"
tokio-util = { version = "0.7", features = ["codec"] }

# Compression dependencies
zstd = { version = "0.13", features = ["zstdmt"] }
flate2 = { version = "1.0", features = ["zlib"] }
lz4 = "1.24"

# Notification system dependencies
reqwest = { version = "0.11", features = ["json"] }
handlebars = "4.3"
lettre = { version = "0.10", features = ["tokio1", "tokio1-native-tls"] }

# Dashboard server dependencies
axum = { version = "0.6", features = ["ws"] }
tower-http = { version = "0.4", features = ["cors", "fs", "trace"] }
tokio-tungstenite = "0.20"
tower = "0.4"

# Testing dependencies
tokio-test = "0.4"
test-context = "0.1"
mockall = "0.11"
criterion = "0.5"
insta = "1.36"
snapbox = "0.5"
tempfile = "3.8"
proptest = "1.6"
chrono = { workspace = true }

# OpenTelemetry dependencies
opentelemetry = { version = "0.20", features = ["metrics"] }
opentelemetry_sdk = { version = "0.20", features = ["metrics", "rt-tokio"] }
opentelemetry-otlp = { version = "0.13", features = ["metrics"] }
opentelemetry-jaeger = { version = "0.19" }

# New dependencies
log = "0.4"
crossterm = "0.27"
ui-terminal = { path = "crates/ui-terminal", optional = true }
dashboard-core = { path = "crates/dashboard-core", optional = true }

[features]
default = ["cli", "plugins", "tui"]
cli = ["dep:clap"]
plugins = []
tui = ["dep:ui-terminal", "dep:dashboard-core", "dep:tokio"]
tauri-ui = []  # New feature for Tauri-based UI

# ... existing code ... 

[[example]]
name = "simple_journal"
path = "examples/simple_journal.rs" 

[[example]]
name = "connection_health_monitor"
path = "examples/connection_health_monitor.rs"

[[example]]
name = "retry_example"
path = "crates/mcp/examples/retry_example.rs"

[workspace.metadata]
rust-version = "1.70.0"

[dev-dependencies]
rand = { workspace = true }
ratatui = { workspace = true }
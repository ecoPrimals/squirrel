[workspace]
resolver = "2"
members = [
    "crates/interfaces",
    "crates/plugins",
    "crates/mcp",
    "crates/core",
    "test_crate",
    "fuzz_old",
    "fuzz",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["DataScienceBioLab"]
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Async runtime and utilities
tokio = { version = "1.35", features = ["full"] }
futures = "0.3.30"
async-trait = "0.1.74"
futures-util = "0.3.28"
tokio-util = { version = "0.7.9", features = ["codec"] }
tokio-test = "0.4.3"

# Error handling
thiserror = "1.0.50"
anyhow = "1.0.79"

# Serialization
serde = { version = "1.0.193", features = ["derive"] }
serde_json = "1.0.108"
uuid = { version = "1.6.1", features = ["v4", "serde"] }
chrono = { version = "0.4.31", features = ["serde"] }

# Logging and telemetry
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
opentelemetry = "0.21.0"
opentelemetry_sdk = "0.21.2"
opentelemetry-jaeger = "0.20.0"

# Web and HTTP
axum = { version = "0.7.1", features = ["ws", "multipart"] }
reqwest = { version = "0.11.23", features = ["json"] }
tower = { version = "0.4.13" }
tower-http = { version = "0.4.4", features = ["cors", "trace", "fs", "limit"] }

# Storage
sled = "0.34.7"

# Cryptography
ring = "0.17.7"

# Utils
bytes = "1.5.0"
lazy_static = "1.4.0"
regex = "1.10.2"
rand = "0.8.5"
log = "0.4.20"
url = "2.4.1"
sha256 = "1.4.0"
semver = "1.0.20"
lru = "0.12.1"
urlencoding = "2.1.3"
tempfile = "3.8.1"
sysinfo = "0.29.11"

# Testing
mockall = "0.12.1"
criterion = "0.5.1"
insta = "1.34.0"
snapbox = "0.4.14"
proptest = "1.4.0"
test-case = "3.3.1"

# Fuzzing
libfuzzer-sys = "0.4"
arbitrary = "1.3"

[workspace.lints.rust]
unsafe_code = "warn"
unused_imports = "warn"
unused_variables = "warn"
missing_docs = "warn"
missing_debug_implementations = "warn"
unreachable_pub = "warn"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = "warn"
unwrap_used = "warn"
expect_used = "warn"
perf = "warn"
nursery = "warn" 
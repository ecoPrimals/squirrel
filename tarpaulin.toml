# Squirrel coverage configuration — ecosystem standard per wateringHole

[tarpaulin]
# Minimum line coverage threshold; CI fails below this.
fail-under = 90.0

# Workspace-wide coverage
all-features = true
workspace = true

# Exclude test/bench/example infrastructure from coverage denominator
exclude-files = [
    "crates/main/tests/*",
    "crates/main/benches/*",
    "crates/main/examples/*",
    "crates/adapter-pattern-tests/*",
]

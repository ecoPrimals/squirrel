# Squirrel Development Configuration
# Updated: March 15, 2026 (v0.1.0-alpha)
#
# TRUE PRIMAL: Squirrel discovers services at runtime via capability discovery.
# This file contains only Squirrel's own configuration — no hardcoded primal
# names, no external service URLs, no database configs.

[ai_router]
discovery_method = "hybrid"
enable_retry = true
max_retries = 2

[server]
# Unix socket is the primary transport (auto-discovered via XDG)
# Override: SQUIRREL_SOCKET=/run/user/<uid>/biomeos/squirrel.sock
max_connections = 100
request_timeout_secs = 60
connection_timeout_secs = 10

[logging]
level = "debug"
json = false

[discovery]
announce_capabilities = true

[limits]
max_request_size_bytes = 10485760   # 10MB
max_response_size_bytes = 52428800  # 50MB

[features]
enable_chaos_testing = true
enable_experimental_features = true
enable_telemetry = true
enable_metrics = true

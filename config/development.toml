# Squirrel Development Configuration
# Version: v1.1.0+
# Updated: January 16, 2026
# Purpose: Development environment overrides

# BUILD MODES (v1.1.0+):
# 
# Production Mode (default):
#   $ cargo build --release
#   - Uses UniversalAiAdapter ONLY (Unix sockets)
#   - NO direct HTTP to AI providers
#   - Requires Songbird AI proxy or AI_PROVIDER_SOCKETS
#
# Development Mode (--features dev-direct-http):
#   $ cargo build --release --features dev-direct-http
#   - Includes OpenAI, HuggingFace, Ollama adapters
#   - Direct HTTP access to AI providers (fast iteration)
#   - Requires API keys (see below)

[ai_router]
# Development mode AI configuration
# If --features dev-direct-http is enabled, you can use:
# 1. Direct HTTP to OpenAI/HuggingFace (requires API keys in environment)
# 2. Unix sockets to Songbird proxy (no API keys needed)
# 3. Unix sockets to Toadstool/NestGate (local AI)
discovery_method = "hybrid"
enable_retry = true
max_retries = 2

# API keys for direct HTTP access (DEV MODE ONLY!)
# Set these environment variables when using --features dev-direct-http:
# - OPENAI_API_KEY="sk-..."
# - HUGGINGFACE_API_KEY="hf_..."
# 
# NOTE: In production mode, these are NOT used (Songbird manages all credentials)

[network]
default_host = "127.0.0.1"
default_port = 8080
health_check_port = 8081
metrics_port = 9090

[service_discovery]
registry_url = "http://localhost:8500"
consul_address = "127.0.0.1:8500"
etcd_endpoints = ["http://localhost:2379"]

[database]
host = "localhost"
port = 5432
database = "squirrel_dev"
max_connections = 10

[mcp]
server_host = "127.0.0.1"
server_port = 3000
websocket_port = 3001
max_connections = 100

[ai_tools]
# Legacy AI tool endpoints (used when --features dev-direct-http is enabled)
anthropic_url = "https://api.anthropic.com"
openai_url = "https://api.openai.com"
ollama_url = "http://localhost:11434"

[observability]
jaeger_endpoint = "http://localhost:14268"
prometheus_port = 9090
grafana_port = 3000

[security]
beardog_url = "http://localhost:8443"
auth_timeout_secs = 60
session_timeout_secs = 3600

[limits]
max_request_size_bytes = 10485760
max_response_size_bytes = 52428800
request_timeout_secs = 60
connection_timeout_secs = 10

[features]
enable_chaos_testing = true
enable_experimental_features = true
enable_telemetry = true
enable_metrics = true


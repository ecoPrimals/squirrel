# Songbird AI Proxy Configuration Example
# Version: v1.1.0+
# Purpose: Example configuration for Songbird to proxy external AI providers
# 
# This file shows what Songbird needs to provide for Squirrel v1.1.0+
# to work in production mode (zero-HTTP architecture).

ai_proxy:
  enabled: true
  
  # AI providers that Songbird will proxy
  providers:
    
    # OpenAI proxy
    - id: openai
      capability: ai:text-generation:openai
      socket: /run/user/1000/songbird-ai-openai.sock
      backend:
        url: https://api.openai.com/v1/chat/completions
        api_key_env: OPENAI_API_KEY  # Songbird reads this, not Squirrel!
      rate_limit:
        requests_per_minute: 60
        requests_per_day: 10000
      cache:
        enabled: true
        ttl_seconds: 300
      retry:
        max_attempts: 3
        backoff: exponential
        backoff_multiplier: 2
      metadata:
        provider_name: "OpenAI GPT"
        is_local: false
        cost_per_1k_tokens: 0.002
        avg_latency_ms: 800
        quality_tier: "premium"
    
    # HuggingFace proxy
    - id: huggingface
      capability: ai:text-generation:huggingface
      socket: /run/user/1000/songbird-ai-huggingface.sock
      backend:
        url: https://api-inference.huggingface.co/models
        api_key_env: HUGGINGFACE_API_KEY
        default_model: "mistralai/Mistral-7B-Instruct-v0.2"
      rate_limit:
        requests_per_minute: 30
      retry:
        max_attempts: 5
        backoff: exponential
        wait_for_model: true  # HF-specific: wait for model to load
      metadata:
        provider_name: "HuggingFace Inference"
        is_local: false
        cost_per_1k_tokens: 0.0  # Free tier
        avg_latency_ms: 2000
        quality_tier: "standard"
    
    # DALL-E (OpenAI image generation)
    - id: dalle
      capability: ai:image-generation:openai
      socket: /run/user/1000/songbird-ai-dalle.sock
      backend:
        url: https://api.openai.com/v1/images/generations
        api_key_env: OPENAI_API_KEY
      rate_limit:
        requests_per_minute: 10
      metadata:
        provider_name: "DALL-E"
        is_local: false
        cost_per_image: 0.02
        avg_latency_ms: 5000
        quality_tier: "high"

  # JSON-RPC protocol settings
  protocol:
    version: "2.0"
    timeout_seconds: 120
    max_request_size_bytes: 1048576  # 1MB
    max_response_size_bytes: 10485760  # 10MB

  # Security settings
  security:
    socket_permissions: "0600"  # Owner read/write only
    require_authentication: false  # Unix socket is already secure
    max_connections_per_socket: 100

  # Observability
  observability:
    log_requests: true
    log_responses: false  # Don't log responses (may contain sensitive data)
    emit_metrics: true
    metrics_prefix: "songbird_ai_proxy"
    trace_requests: true

# How Squirrel discovers these providers:
#
# Option 1: Environment variable (manual configuration)
#   $ export AI_PROVIDER_SOCKETS="/run/user/1000/songbird-ai-openai.sock,/run/user/1000/songbird-ai-huggingface.sock"
#
# Option 2: Songbird capability discovery (automatic - future)
#   Squirrel queries Songbird: "Who has ai:text-generation:*?"
#   Songbird responds with socket paths and metadata
#
# Option 3: Socket registry file (semi-automatic)
#   Songbird writes /run/user/1000/songbird-ai-registry.json
#   Squirrel reads it on startup

# Example Songbird AI registry file:
# {
#   "version": "1.0",
#   "providers": [
#     {
#       "capability": "ai:text-generation:openai",
#       "socket_path": "/run/user/1000/songbird-ai-openai.sock",
#       "metadata": {
#         "provider_id": "openai",
#         "provider_name": "OpenAI GPT",
#         "is_local": false,
#         "cost_per_unit": 0.002,
#         "avg_latency_ms": 800,
#         "quality_tier": "premium",
#         "capabilities": ["ai:text-generation:openai"],
#         "supports_text_generation": true,
#         "supports_image_generation": false
#       }
#     }
#   ]
# }


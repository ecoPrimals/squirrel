# Squirrel Production Configuration

[server]
host = "0.0.0.0"
port = 8080
workers = 4
keep_alive = 30
client_timeout = 30
max_connections = 1000

[monitoring]
enabled = true
port = 8081
metrics_interval = 30
health_check_interval = 10
retention_days = 30

[database]
url = "sqlite:///app/data/squirrel.db"
pool_size = 10
connection_timeout = 30
idle_timeout = 300

[plugins]
enabled = true
directory = "/app/plugins"
sandbox_enabled = true
max_plugins = 50
plugin_timeout = 60

[mcp]
protocol_version = "1.0"
timeout = 30
max_connections = 100
buffer_size = 8192

[security]
enable_auth = true
jwt_secret_env = "JWT_SECRET"
jwt_expiration_hours = 24
rate_limit_requests = 100
rate_limit_window = 60

[logging]
level = "info"
format = "json"
file_path = "/app/logs/squirrel.log"
max_file_size = "100MB"
max_files = 10

[performance]
enable_cache = true
cache_size = "128MB"
compression_enabled = true
worker_threads = 4

[features]
monitoring = true
plugins = true
security = true
metrics = true 
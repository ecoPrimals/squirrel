# Squirrel Production Configuration
# Updated: March 15, 2026 (v0.1.0-alpha)
#
# TRUE PRIMAL: All external communication via capability discovery.
# No direct HTTP to AI providers — Songbird proxies all external traffic.
# No hardcoded primal names or URLs.

[ai_router]
discovery_method = "capability"
enable_retry = true
max_retries = 2

[server]
max_connections = 1000
request_timeout_secs = 30
connection_timeout_secs = 5

[logging]
level = "info"
json = true

[discovery]
announce_capabilities = true

[limits]
max_request_size_bytes = 10485760   # 10MB
max_response_size_bytes = 52428800  # 50MB

[features]
enable_chaos_testing = false
enable_experimental_features = false
enable_telemetry = true
enable_metrics = true

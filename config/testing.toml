# Squirrel Testing Configuration
# Updated: March 15, 2026 (v0.1.0-alpha)
#
# Minimal config for test suites. Tests use in-process transports
# and mock providers — no external services required.

[ai_router]
discovery_method = "hybrid"
enable_retry = false
max_retries = 0

[server]
max_connections = 50
request_timeout_secs = 5
connection_timeout_secs = 2

[logging]
level = "warn"
json = false

[discovery]
announce_capabilities = false

[limits]
max_request_size_bytes = 1048576    # 1MB
max_response_size_bytes = 5242880   # 5MB

[features]
enable_chaos_testing = false
enable_experimental_features = true
enable_telemetry = false
enable_metrics = false

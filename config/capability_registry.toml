[capabilities.tool_execute.input_schema]
type = "object"
required = ["tool"]
[capabilities.tool_execute.input_schema.properties.tool]
type = "string"
description = "Tool name to execute"
[capabilities.tool_execute.input_schema.properties.args]
type = "object"

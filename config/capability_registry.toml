# Squirrel Capability Registry — Source of truth for capability.discover and tool.list
#
# This file is loaded at startup and used to respond to:
#   - capability.discover (returns all capability method names)
#   - tool.list (returns tool definitions with schemas)
#
# Pattern adopted from wetSpring's capability_registry.toml

[primal]
name = "squirrel"
version = "0.1.0"
domain = "ai"
license = "AGPL-3.0-or-later"
transport = "unix_socket"
protocol = "json-rpc-2.0"

# --- Inference domain (CANONICAL per SEMANTIC_METHOD_NAMING_STANDARD v2.0 §7) ---
# stability: evolving — wire format stable, provider routing actively evolving

[capabilities.inference_complete]
method = "inference.complete"
domain = "inference.execution"
stability = "evolving"
description = "Text/chat completion — canonical inference wire method"
[capabilities.inference_complete.input_schema]
type = "object"
required = ["prompt"]
[capabilities.inference_complete.input_schema.properties.prompt]
type = "string"
description = "Text prompt to complete"
[capabilities.inference_complete.input_schema.properties.messages]
type = "array"
description = "Chat messages (alternative to prompt)"
[capabilities.inference_complete.input_schema.properties.model]
type = "string"
description = "Model to use (optional, provider-specific)"
[capabilities.inference_complete.input_schema.properties.temperature]
type = "number"
description = "Sampling temperature (0.0-2.0)"
[capabilities.inference_complete.input_schema.properties.max_tokens]
type = "integer"
description = "Maximum tokens in response"

[capabilities.inference_embed]
method = "inference.embed"
domain = "inference.execution"
stability = "evolving"
description = "Embedding generation via registered inference providers (UDS or HTTP)"
[capabilities.inference_embed.input_schema]
type = "object"
required = ["input"]
[capabilities.inference_embed.input_schema.properties.input]
type = "string"
description = "Text to embed"
[capabilities.inference_embed.input_schema.properties.model]
type = "string"
description = "Embedding model to use"

[capabilities.inference_models]
method = "inference.models"
domain = "inference.discovery"
stability = "evolving"
description = "List available inference models across all providers"
[capabilities.inference_models.input_schema]
type = "object"

[capabilities.inference_register_provider]
method = "inference.register_provider"
domain = "inference.lifecycle"
stability = "evolving"
description = "Register a spring as an inference backend (neuralSpring, etc.)"
[capabilities.inference_register_provider.input_schema]
type = "object"
required = ["provider_id"]
[capabilities.inference_register_provider.input_schema.properties.provider_id]
type = "string"
description = "Unique provider identifier"
[capabilities.inference_register_provider.input_schema.properties.socket]
type = "string"
description = "Unix socket path for the provider"
[capabilities.inference_register_provider.input_schema.properties.capabilities]
type = "object"
description = "Provider capabilities (supported_tasks, models, supports_streaming, max_context_size, quality_tier, cost_per_unit) — also accepts array shorthand"

[capabilities.inference_unregister_provider]
method = "inference.unregister_provider"
domain = "inference.lifecycle"
stability = "evolving"
description = "Unregister an inference provider (graceful spring shutdown)"
[capabilities.inference_unregister_provider.input_schema]
type = "object"
required = ["provider_id"]
[capabilities.inference_unregister_provider.input_schema.properties.provider_id]
type = "string"
description = "Provider identifier to remove"

# --- AI domain (backward-compat aliases — route to inference.* handlers) ---
# stability: stable — wire format frozen, aliases for inference.*

[capabilities.ai_query]
method = "ai.query"
domain = "ai.inference"
stability = "stable"
description = "Route prompt to best available AI model"
[capabilities.ai_query.input_schema]
type = "object"
required = ["prompt"]
[capabilities.ai_query.input_schema.properties.prompt]
type = "string"
description = "The prompt to send to the AI"
[capabilities.ai_query.input_schema.properties.model]
type = "string"
description = "Model to use (optional, provider-specific)"
[capabilities.ai_query.input_schema.properties.max_tokens]
type = "integer"
description = "Maximum tokens in response"
[capabilities.ai_query.input_schema.properties.temperature]
type = "number"
description = "Sampling temperature (0.0-2.0)"

[capabilities.ai_list_providers]
method = "ai.list_providers"
domain = "ai.discovery"
stability = "stable"
description = "List available AI providers and their status"
[capabilities.ai_list_providers.input_schema]
type = "object"

[capabilities.ai_complete]
method = "ai.complete"
domain = "ai.inference"
stability = "stable"
description = "Text completion (alias for ai.query)"
[capabilities.ai_complete.input_schema]
type = "object"
required = ["prompt"]
[capabilities.ai_complete.input_schema.properties.prompt]
type = "string"

[capabilities.ai_chat]
method = "ai.chat"
domain = "ai.inference"
stability = "stable"
description = "Chat completion with message history"
[capabilities.ai_chat.input_schema]
type = "object"
required = ["prompt"]
[capabilities.ai_chat.input_schema.properties.prompt]
type = "string"

# --- Capability domain ---
# stability: stable — core routing contract

[capabilities.capability_announce]
method = "capability.announce"
domain = "capability.routing"
stability = "stable"
description = "Accept capability and tool announcements from remote primals"
[capabilities.capability_announce.input_schema]
type = "object"
required = ["capabilities"]
[capabilities.capability_announce.input_schema.properties.capabilities]
type = "array"
description = "Capability namespaces to announce"
[capabilities.capability_announce.input_schema.properties.primal]
type = "string"
description = "Announcing primal's name"
[capabilities.capability_announce.input_schema.properties.socket_path]
type = "string"
description = "Unix socket for forwarding"
[capabilities.capability_announce.input_schema.properties.tools]
type = "array"
description = "Tool names the primal provides"

[capabilities.capabilities_announce]
method = "capabilities.announce"
domain = "capability.routing"
stability = "stable"
description = "Accept capability announcements (alias of capability.announce)"
[capabilities.capabilities_announce.input_schema]
type = "object"
required = ["capabilities"]

[capabilities.primal_announce]
method = "primal.announce"
domain = "primal.registration"
stability = "stable"
description = "Self-registration announcement (stadial standard alias)"
[capabilities.primal_announce.input_schema]
type = "object"
required = ["capabilities"]

[capabilities.capability_discover]
method = "capability.discover"
domain = "capability.discovery"
stability = "stable"
description = "Report own capabilities for socket scanning"
[capabilities.capability_discover.input_schema]
type = "object"

[capabilities.capabilities_list]
method = "capabilities.list"
domain = "capability.discovery"
stability = "stable"
description = "List per-method cost/dependency detail for PathwayLearner scheduling (canonical per SEMANTIC_METHOD_NAMING_STANDARD v2.1)"
[capabilities.capabilities_list.input_schema]
type = "object"

[capabilities.capability_list_alias]
method = "capability.list"
domain = "capability.discovery"
stability = "stable"
description = "Alias for capabilities.list — retained for ecosystem backward compatibility"
[capabilities.capability_list_alias.input_schema]
type = "object"

# --- Health domain (PRIMAL_IPC_PROTOCOL v3.0 — canonical, NON-NEGOTIABLE) ---
# stability: stable — health triad is frozen

[capabilities.health_check]

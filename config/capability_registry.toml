[capabilities.context_create.input_schema]
type = "object"
[capabilities.context_create.input_schema.properties.session_id]
type = "string"
description = "Optional session ID (auto-generated if omitted)"
[capabilities.context_create.input_schema.properties.metadata]
type = "object"
description = "Initial metadata for the context"

[capabilities.context_update]
method = "context.update"
domain = "context.management"
stability = "evolving"
description = "Update an existing context with new data"
[capabilities.context_update.input_schema]
type = "object"
required = ["id"]
[capabilities.context_update.input_schema.properties.id]
type = "string"
description = "Context ID to update"
[capabilities.context_update.input_schema.properties.data]
type = "object"
description = "Data to merge into context state"

[capabilities.context_summarize]
method = "context.summarize"
domain = "context.management"
stability = "evolving"
description = "Summarize a context session"
[capabilities.context_summarize.input_schema]
type = "object"
required = ["id"]
[capabilities.context_summarize.input_schema.properties.id]
type = "string"
description = "Context ID to summarize"

# --- Provider domain (spring capability registration) ---
# stability: evolving — spring registration protocol expanding

[capabilities.provider_register]
method = "provider.register"
domain = "provider.registration"
stability = "evolving"
description = "Register a spring as a capability provider for routing"
[capabilities.provider_register.input_schema]
type = "object"
required = ["provider_id", "capabilities"]
[capabilities.provider_register.input_schema.properties.provider_id]
type = "string"
[capabilities.provider_register.input_schema.properties.socket]
type = "string"
[capabilities.provider_register.input_schema.properties.endpoint]
type = "string"
[capabilities.provider_register.input_schema.properties.capabilities]
type = "array"
[capabilities.provider_register.input_schema.properties.version]
type = "string"
[capabilities.provider_register.input_schema.properties.domain]
type = "string"

[capabilities.provider_list]
method = "provider.list"
domain = "provider.registration"
stability = "evolving"
description = "List all registered capability providers"
[capabilities.provider_list.input_schema]
type = "object"

[capabilities.provider_deregister]
method = "provider.deregister"
domain = "provider.registration"
stability = "evolving"
description = "Remove a registered provider"
[capabilities.provider_deregister.input_schema]
type = "object"
required = ["provider_id"]
[capabilities.provider_deregister.input_schema.properties.provider_id]
type = "string"

# --- BTSP domain (Phase 3 - encrypted channel) ---
# stability: evolving — cipher negotiation protocol advancing

[capabilities.btsp_negotiate]
method = "btsp.negotiate"
domain = "btsp.security"
stability = "evolving"
description = "Negotiate cipher for BTSP Phase 3 encrypted channel upgrade"
[capabilities.btsp_negotiate.input_schema]
type = "object"
required = ["session_id"]
[capabilities.btsp_negotiate.input_schema.properties.session_id]
type = "string"
description = "Session ID from Phase 2 handshake"
[capabilities.btsp_negotiate.input_schema.properties.preferred_cipher]
type = "string"
description = "Preferred cipher suite (e.g. chacha20-poly1305)"
[capabilities.btsp_negotiate.input_schema.properties.bond_type]
type = "string"
description = "Bond type (e.g. Covalent)"

# --- Lifecycle domain (Phase 2 - biomeOS) ---
